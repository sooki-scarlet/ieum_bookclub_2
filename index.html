<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>이음북클럽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── 변수 ─────────────────────────────────────────── */
:root {
  --bg:        #F9F8F6;
  --lavender:  #6A5D6B;
  --mint:      #4A6352;
  --gold:      #C8952A;
  --text:      #2C2C2C;
  --text-sub:  #6B6B6B;
  --border:    #DDD8D0;
  --card-bg:   #FFFFFF;
  --shadow:    0 2px 12px rgba(0,0,0,0.06);
  --radius:    10px;
  --accent-l:  2px solid var(--lavender);
  --accent-m:  2px solid var(--mint);
  --accent-g:  2px solid var(--gold);
}

/* ── 리셋 ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 80px;
}
button { cursor: pointer; font-family: inherit; }
input, textarea, select {
  font-family: inherit;
  font-size: 0.875rem;
  outline: none;
}
a { text-decoration: none; color: inherit; }

/* ── 헤더 ─────────────────────────────────────────── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.app-logo {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 1.25rem;
  letter-spacing: 0.04em;
  color: var(--lavender);
}
.app-logo span { color: var(--mint); }
.header-right { display: flex; align-items: center; gap: 10px; }
.alias-badge {
  font-size: 0.75rem;
  background: var(--lavender);
  color: #fff;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.btn-login, .btn-logout {
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-sub);
  transition: all .2s;
}
.btn-login:hover { border-color: var(--lavender); color: var(--lavender); }
.btn-logout:hover { border-color: #c00; color: #c00; }

/* ── 탭 네비 ──────────────────────────────────────── */
.tab-nav {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  gap: 2px;
  position: sticky; top: 57px; z-index: 99;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 10px 14px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-sub);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  white-space: nowrap;
}
.tab-btn.active { color: var(--lavender); border-bottom-color: var(--lavender); font-weight: 600; }

/* ── 패널 ─────────────────────────────────────────── */
.tab-panel { display: none; padding: 18px; }
.tab-panel.active { display: block; }

/* ── 카드 공통 ────────────────────────────────────── */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  margin-bottom: 12px;
}
.card-l { border-left: var(--accent-l); }
.card-m { border-left: var(--accent-m); }
.card-g { border-left: var(--accent-g); }

.section-title {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-sub);
  margin-bottom: 10px;
}
.book-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}
.book-author {
  font-size: 0.78rem;
  color: var(--text-sub);
  margin-top: 3px;
}
.meta-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.75rem; color: var(--text-sub); margin-top: 8px;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 600;
}
.tag-lavender { background: #EDE8EE; color: var(--lavender); }
.tag-mint     { background: #E6EDEA; color: var(--mint); }
.tag-gold     { background: #FBF3E3; color: var(--gold); }

/* ── 폼 공통 ──────────────────────────────────────── */
.form-group { margin-bottom: 12px; }
.form-label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: #fff;
  color: var(--text);
  font-size: 0.875rem;
  transition: border-color .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--lavender);
}
.form-textarea { resize: vertical; min-height: 72px; }

/* ── 버튼 공통 ────────────────────────────────────── */
.btn {
  display: inline-block;
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 600;
  border: none;
  transition: all .2s;
  text-align: center;
}
.btn-primary { background: var(--lavender); color: #fff; }
.btn-primary:hover { background: #5a4e5b; }
.btn-mint   { background: var(--mint); color: #fff; }
.btn-mint:hover { background: #3c5344; }
.btn-gold   { background: var(--gold); color: #fff; }
.btn-gold:hover { background: #a97d22; }
.btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--text-sub); }
.btn-ghost:hover { border-color: var(--lavender); color: var(--lavender); }
.btn-danger { background: #c0392b; color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-sm     { padding: 5px 12px; font-size: 0.75rem; }
.btn-block  { display: block; width: 100%; }

/* ── 로딩 스피너 ──────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--lavender);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-wrap { text-align: center; padding: 32px; color: var(--text-sub); }

/* ── 토스트 ───────────────────────────────────────── */
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #2C2C2C; color: #fff;
  padding: 10px 22px;
  border-radius: 22px;
  font-size: 0.82rem;
  opacity: 0;
  transition: all .3s;
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
  max-width: calc(100vw - 40px);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── 별점 (원형 점) ───────────────────────────────── */
.rating-dots {
  display: flex; gap: 4px; align-items: center;
}
.rating-dots .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--lavender);
  background: transparent;
  cursor: pointer;
  transition: background .15s;
}
.rating-dots .dot.filled { background: var(--lavender); }
.rating-dots.mint .dot { border-color: var(--mint); }
.rating-dots.mint .dot.filled { background: var(--mint); }
.rating-dots.gold .dot { border-color: var(--gold); }
.rating-dots.gold .dot.filled { background: var(--gold); }

.rating-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.rating-label { font-size: 0.78rem; color: var(--text-sub); font-weight: 500; }

/* ── 모달 ─────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000; align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--card-bg);
  width: 100%; max-width: 480px;
  border-radius: 16px 16px 0 0;
  padding: 20px 18px 32px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.modal-title { font-size: 1rem; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%; border: none;
  background: var(--bg);
  color: var(--text-sub);
  font-size: 1rem; line-height: 28px; text-align: center;
}

/* ── 하단 네비 ────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.bottom-nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  padding: 8px 4px;
  font-size: 0.62rem;
  color: var(--text-sub);
  background: transparent; border: none;
  transition: color .2s;
}
.bottom-nav-btn svg { width: 20px; height: 20px; }
.bottom-nav-btn.active { color: var(--lavender); }
.bottom-nav-btn.active svg path, .bottom-nav-btn.active svg circle { stroke: var(--lavender); }

/* ── 이음책 탭 ────────────────────────────────────── */
.current-book-card {
  background: linear-gradient(135deg, #EDE8EE 0%, #F9F8F6 100%);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  border-left: var(--accent-l);
  position: relative;
  overflow: hidden;
}
.current-book-card::before {
  content: '📚';
  position: absolute; right: 16px; bottom: 12px;
  font-size: 2.5rem; opacity: 0.15;
}
.current-book-card .book-title { font-size: 1.2rem; }
.session-date-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.session-date-item:last-child { border-bottom: none; }
.session-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--lavender); color: #fff;
  font-size: 0.7rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.session-num.mint { background: var(--mint); }

/* ── 추천 탭 ──────────────────────────────────────── */
.rec-item {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.rec-item:last-child { border-bottom: none; }
.rec-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ── 투표 탭 ──────────────────────────────────────── */
.vote-card { position: relative; }
.vote-deadline { font-size: 0.72rem; color: var(--text-sub); }
.vote-option {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .2s;
}
.vote-option:hover { border-color: var(--lavender); }
.vote-option.selected { border-color: var(--lavender); background: #EDE8EE; }
.vote-option-title { font-size: 0.85rem; font-weight: 500; }
.vote-score-row {
  display: flex; gap: 6px; margin-top: 8px; align-items: center;
}
.score-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent; font-size: 0.75rem; font-weight: 600;
  color: var(--text-sub); transition: all .2s;
}
.score-btn.active { border-color: var(--lavender); background: var(--lavender); color: #fff; }
.vote-result-bar {
  height: 6px; border-radius: 3px;
  background: linear-gradient(to right, var(--lavender), var(--mint));
  transition: width .4s;
  margin-top: 6px;
}

/* ── 서평 탭 ──────────────────────────────────────── */
.review-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.review-item:last-child { border-bottom: none; }
.review-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.review-alias { font-size: 0.82rem; font-weight: 600; color: var(--lavender); }
.review-comment { font-size: 0.82rem; color: var(--text); line-height: 1.6; margin-top: 6px; }
.avg-badge {
  font-size: 0.72rem; font-weight: 700;
  background: var(--bg); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 10px;
}

/* ── 라이브러리 탭 ────────────────────────────────── */
.lib-item {
  padding: 12px;
  border-radius: var(--radius);
  background: var(--card-bg);
  box-shadow: var(--shadow);
  margin-bottom: 8px;
  border-left: var(--accent-m);
  cursor: pointer;
}
.lib-item .book-title { font-size: 0.92rem; }
.lib-reviews { display: none; padding: 10px 0 4px; }
.lib-reviews.open { display: block; }
.archive-year { font-size: 0.85rem; font-weight: 700; color: var(--lavender); margin: 14px 0 6px; }
.archive-item {
  padding: 8px 12px;
  border-left: 2px solid var(--border);
  margin-bottom: 6px;
}
.archive-item .book-title { font-size: 0.85rem; }

/* ── 관리자 탭 ────────────────────────────────────── */
.admin-section { margin-bottom: 20px; }
.admin-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-sub);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.session-admin-item {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.session-admin-item:last-child { border-bottom: none; }
.session-admin-actions { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

/* ── 체크박스 커스텀 ──────────────────────────────── */
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px dashed var(--border);
  cursor: pointer;
}
.check-item:last-child { border-bottom: none; }
.check-box {
  width: 18px; height: 18px; border-radius: 4px;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
}
.check-box.checked { background: var(--lavender); border-color: var(--lavender); }
.check-box.checked::after { content: '✓'; color: #fff; font-size: 0.65rem; font-weight: 700; }

/* ── 로그인 화면 ──────────────────────────────────── */
.login-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(249,248,246,0.97);
  z-index: 2000;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 32px;
}
.login-overlay.show { display: flex; }
.login-logo {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1.8rem; font-weight: 800;
  color: var(--lavender); margin-bottom: 8px; text-align: center;
}
.login-sub { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 32px; text-align: center; }
.login-box { width: 100%; max-width: 320px; }

/* ── 구분선 ───────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ── 빈 상태 ──────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 28px 16px;
  color: var(--text-sub); font-size: 0.82rem;
}
.empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 8px; }

/* ── 입력 그룹 row ─────────────────────────────────── */
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>

<!-- ======== 헤더 ======== -->
<header class="app-header">
  <div class="app-logo">이음<span>북클럽</span></div>
  <div class="header-right" id="headerRight">
    <button class="btn-login" id="btnLoginOpen">로그인</button>
  </div>
</header>

<!-- ======== 탭 네비 ======== -->
<nav class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="tab-book">이음책</button>
  <button class="tab-btn" data-tab="tab-rec">추천</button>
  <button class="tab-btn" data-tab="tab-vote">투표</button>
  <button class="tab-btn" data-tab="tab-review">서평</button>
  <button class="tab-btn" data-tab="tab-library">라이브러리</button>
  <button class="tab-btn" data-tab="tab-admin" id="tabAdminBtn" style="display:none">관리자</button>
</nav>

<!-- ======================================================
     탭 패널들
     ====================================================== -->
<main>

<!-- ── 이음책 탭 ── -->
<div class="tab-panel active" id="tab-book">
  <div id="bookTabContent">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── 추천 탭 ── -->
<div class="tab-panel" id="tab-rec">
  <div id="recTabContent">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── 투표 탭 ── -->
<div class="tab-panel" id="tab-vote">
  <div id="voteTabContent">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── 서평 탭 ── -->
<div class="tab-panel" id="tab-review">
  <div id="reviewTabContent">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── 라이브러리 탭 ── -->
<div class="tab-panel" id="tab-library">
  <div id="libraryTabContent">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── 관리자 탭 ── -->
<div class="tab-panel" id="tab-admin">
  <div id="adminTabContent">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

</main>

<!-- ======== 로그인 오버레이 ======== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-logo">이음북클럽</div>
  <div class="login-sub">별칭과 비밀번호를 입력해주세요</div>
  <div class="login-box">
    <div class="form-group">
      <label class="form-label">별칭</label>
      <input class="form-input" id="loginAlias" placeholder="예) 이음1" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input class="form-input" type="password" id="loginPw" placeholder="비밀번호">
    </div>
    <div id="loginError" style="color:#c0392b;font-size:0.78rem;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary btn-block" id="btnLoginConfirm">로그인</button>
    <div class="divider"></div>
    <p style="font-size:0.75rem;color:var(--text-sub);text-align:center;margin-bottom:10px">
      아직 회원이 아니신가요?
    </p>
    <button class="btn btn-ghost btn-block" id="btnRegisterOpen">회원 등록</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" id="btnLoginCancel">닫기</button>
  </div>
</div>

<!-- ======== 회원 등록 모달 ======== -->
<div class="modal-overlay" id="modalRegister">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">회원 등록</span>
      <button class="modal-close" id="btnRegisterClose">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">별칭 *</label>
      <input class="form-input" id="regAlias" placeholder="북클럽에서 사용할 별칭">
    </div>
    <div class="form-group">
      <label class="form-label">이름 *</label>
      <input class="form-input" id="regName" placeholder="실명">
    </div>
    <div class="row-2">
      <div class="form-group">
        <label class="form-label">생년월일</label>
        <input class="form-input" id="regBirth" placeholder="예) 1990-01-01">
      </div>
      <div class="form-group">
        <label class="form-label">성별</label>
        <select class="form-select" id="regGender">
          <option value="">선택</option>
          <option value="여">여</option>
          <option value="남">남</option>
          <option value="기타">기타</option>
        </select>
      </div>

<div id="toast"></div>

<!-- ======================================================
     JavaScript
     ====================================================== -->
<script>
// ── 설정 ────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbzDdIMiPZAVrblpXuZeUJh2zFP_gUQ9q707rKRrmh32x_-2iCDeWEQf7caGwSoeSsVO0Q/exec';
const ADMIN_ALIAS = '이음1';
const ADMIN_PW = '1111';

// ── 상태 ────────────────────────────────────────────
let state = {
  alias: localStorage.getItem('ieum_alias') || '',
  isAdmin: localStorage.getItem('ieum_alias') === ADMIN_ALIAS,
  dashboard: null,        // 캐시
  dashboardTs: 0,         // 캐시 타임스탬프
  library: null,
  libraryTs: 0,
  votes: null,
  votesTs: 0,
  currentTab: 'tab-book',
  reviewRatings: { gamdon: 0, jeonhwan: 0, saeroun: 0 },
};
const CACHE_TTL = 60000; // 1분

// ── 유틸 ────────────────────────────────────────────
function toast(msg, duration = 2400) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function showLoading(id) {
  document.getElementById(id).innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function fmt(dateStr) {
  if (!dateStr) return '';
  return dateStr.substring(0, 10);
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = dateStr.substring(0, 10).split('-');
  return d.length === 3 ? `${d[1]}월 ${d[2]}일` : dateStr;
}

// ── JSONP GET ────────────────────────────────────────
function apiFetch(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = Object.entries({ ...params, callback: cb })
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cb];
      document.head.removeChild(script);
      reject(new Error('timeout'));
    }, 15000);
    window[cb] = (data) => {
      clearTimeout(timer);
      delete window[cb];
      document.head.removeChild(script);
      resolve(data);
    };
    script.src = `${API_URL}?${qs}`;
    document.head.appendChild(script);
  });
}

// ── POST (no-cors) ───────────────────────────────────
function apiPost(body) {
  return fetch(API_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

// ── 대시보드 캐시 ────────────────────────────────────
async function getDashboard(force = false) {
  if (!force && state.dashboard && Date.now() - state.dashboardTs < CACHE_TTL) {
    return state.dashboard;
  }
  const data = await apiFetch({ action: 'getDashboard' });
  if (data.ok) {
    state.dashboard = data;
    state.dashboardTs = Date.now();
  }
  return data;
}

async function getLibraryData(force = false) {
  if (!force && state.library && Date.now() - state.libraryTs < CACHE_TTL) {
    return state.library;
  }
  const data = await apiFetch({ action: 'getLibrary' });
  if (data.ok) {
    state.library = data;
    state.libraryTs = Date.now();
  }
  return data;
}

async function getVotesData(force = false) {
  if (!force && state.votes && Date.now() - state.votesTs < CACHE_TTL) {
    return state.votes;
  }
  const data = await apiFetch({ action: 'getVotes' });
  if (data.ok) {
    state.votes = data;
    state.votesTs = Date.now();
  }
  return data;
}

// ============================================================
// 탭 전환
// ============================================================
function switchTab(tabId) {
  state.currentTab = tabId;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tabId)
  );
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === tabId)
  );
  renderTab(tabId);
}

function renderTab(tabId) {
  switch(tabId) {
    case 'tab-book':    renderBookTab();    break;
    case 'tab-rec':     renderRecTab();     break;
    case 'tab-vote':    renderVoteTab();    break;
    case 'tab-review':  renderReviewTab();  break;
    case 'tab-library': renderLibraryTab(); break;
    case 'tab-admin':   renderAdminTab();   break;
  }
}

// ============================================================
// 이음책 탭
// ============================================================
async function renderBookTab() {
  showLoading('bookTabContent');
  try {
    const data = await getDashboard();
    const cb = data.currentBook;
    const nb = data.nextBook;
    const sessions = (data.sessions || []).filter(s => s.status !== 'done');

    let html = '';

    // 이달의 책
    if (cb && cb.bookTitle) {
      html += `
        <div class="current-book-card">
          <div class="section-title">📖 이달의 책</div>
          <div class="book-title">${cb.bookTitle}</div>
          <div class="book-author">${cb.bookAuthor || ''}</div>
          ${cb.month ? `<div class="meta-row"><span class="tag tag-lavender">${cb.month}</span></div>` : ''}
        </div>`;
    } else {
      html += `<div class="card card-l"><div class="empty-state"><span class="emoji">📖</span>이달의 책이 아직 선정되지 않았습니다.</div></div>`;
    }

    // 이달의 북토크
    html += `<div class="card card-m"><div class="section-title">🗓 이달의 북토크</div>`;
    if (sessions.length === 0) {
      html += `<div class="empty-state" style="padding:12px 0">세션이 아직 없습니다.</div>`;
    } else {
      sessions.forEach((s, i) => {
        const dates = [s.date1, s.date2].filter(Boolean);
        dates.forEach((d, j) => {
          html += `
            <div class="session-date-item">
              <div class="session-num ${j===1?'mint':''}">${j+1}</div>
              <div>
                <div style="font-size:0.82rem;font-weight:600">${fmtDate(d)}</div>
                <div style="font-size:0.73rem;color:var(--text-sub)">${s.bookTitle}</div>
              </div>
            </div>`;
        });
      });
    }
    html += `</div>`;

    // 다음달 예고
    if (nb && nb.title) {
      html += `
        <div class="card card-g">
          <div class="section-title">🔜 다음달 예고</div>
          <div class="book-title">${nb.title}</div>
          <div class="book-author">${nb.author || ''}</div>
          ${nb.month ? `<div class="meta-row"><span class="tag tag-gold">${nb.month}</span></div>` : ''}
        </div>`;
    }

    document.getElementById('bookTabContent').innerHTML = html;
  } catch(e) {
    document.getElementById('bookTabContent').innerHTML = `<div class="empty-state"><span class="emoji">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}

// ============================================================
// 추천 탭
// ============================================================
async function renderRecTab() {
  showLoading('recTabContent');
  try {
    const data = await getDashboard();
    const recs = data.recommendations || [];

    let html = '';
    // 등록 버튼 (로그인 시)
    if (state.alias) {
      html += `<button class="btn btn-primary btn-block" style="margin-bottom:14px" id="btnRecOpen">+ 책 추천 등록</button>`;
    } else {
      html += `<div style="font-size:0.78rem;color:var(--text-sub);margin-bottom:14px;text-align:center">로그인 후 추천을 등록할 수 있습니다.</div>`;
    }

    html += `<div class="card"><div class="section-title">클러버 추천 목록</div>`;
    if (recs.length === 0) {
      html += `<div class="empty-state" style="padding:10px 0">아직 추천된 책이 없습니다.</div>`;
    } else {
      recs.forEach(r => {
        const canDel = state.alias && (state.alias === r.alias || state.isAdmin);
        html += `
          <div class="rec-item">
            <div style="flex:1;min-width:0">
              <div class="book-title" style="font-size:0.9rem">${r.title}</div>
              <div class="book-author">${r.author || ''}${r.pub ? ' · '+r.pub : ''}</div>
              <div style="font-size:0.73rem;color:var(--text-sub);margin-top:3px">
                <span class="tag tag-lavender">${r.alias}</span>
              </div>
              ${r.reason ? `<div style="font-size:0.78rem;color:var(--text-sub);margin-top:5px;line-height:1.5">${r.reason}</div>` : ''}
            </div>
            <div class="rec-actions">
              ${canDel ? `<button class="btn btn-ghost btn-sm" onclick="deleteRec('${r.alias.replace(/'/g,"\\'")}','${r.title.replace(/'/g,"\\'")}')">삭제</button>` : ''}
            </div>
          </div>`;
      });
    }
    html += `</div>`;

    document.getElementById('recTabContent').innerHTML = html;

    // 이벤트
    const openBtn = document.getElementById('btnRecOpen');
    if (openBtn) openBtn.addEventListener('click', () => {
      document.getElementById('recTitle').value = '';
      document.getElementById('recAuthor').value = '';
      document.getElementById('recPub').value = '';
      document.getElementById('recReason').value = '';
      openModal('modalRec');
    });
  } catch(e) {
    document.getElementById('recTabContent').innerHTML = `<div class="empty-state"><span class="emoji">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}

async function deleteRec(alias, title) {
  if (!confirm(`"${title}" 추천을 삭제하시겠습니까?`)) return;
  await apiPost({ action: 'deleteRecommendation', alias, title, isAdmin: state.isAdmin });
  toast('삭제되었습니다.');
  state.dashboard = null; // 캐시 무효화
  renderRecTab();
}

// ============================================================
// 투표 탭
// ============================================================
async function renderVoteTab() {
  showLoading('voteTabContent');
  try {
    const data = await getVotesData(true);
    const votes = data.votes || [];

    let html = '';
    if (votes.length === 0) {
      html = `<div class="card"><div class="empty-state"><span class="emoji">🗳</span>진행 중인 투표가 없습니다.</div></div>`;
    } else {
      votes.forEach(v => {
        if (v.status === 'deleted') return;
        const opts = (v.options || '').split('||').filter(Boolean);
        const responses = v.responses || [];
        const myResponses = responses.filter(r => r.alias === state.alias);

        // 각 옵션별 평균 점수 계산
        const optScores = opts.map(opt => {
          const rs = responses.filter(r => r.bookTitle === opt);
          const avg = rs.length > 0 ? rs.reduce((s, r) => s + parseFloat(r.score||0), 0) / rs.length : 0;
          return { opt, avg: avg.toFixed(1), count: rs.length };
        });
        const maxAvg = Math.max(...optScores.map(o => parseFloat(o.avg)), 0.1);

        html += `<div class="card card-l vote-card" data-vote="${v.voteId}">
          <div class="section-title" style="margin-bottom:6px">🗳 투표</div>
          <div style="font-size:0.95rem;font-weight:700;margin-bottom:4px">${v.title}</div>
          ${v.deadline ? `<div class="vote-deadline">마감: ${fmt(v.deadline)}</div>` : ''}
          <div class="divider"></div>`;

        opts.forEach(opt => {
          const sc = optScores.find(o => o.opt === opt);
          const myR = myResponses.find(r => r.bookTitle === opt);
          const myScore = myR ? parseInt(myR.score) : 0;
          const barW = maxAvg > 0 ? Math.round((parseFloat(sc.avg) / maxAvg) * 100) : 0;

          html += `<div class="vote-option" data-vote="${v.voteId}" data-book="${opt.replace(/"/g,'&quot;')}">
            <div class="vote-option-title">${opt}</div>`;

          if (state.alias) {
            html += `<div class="vote-score-row">
              <span style="font-size:0.72rem;color:var(--text-sub);margin-right:4px">점수:</span>`;
            for (let i = 1; i <= 5; i++) {
              html += `<button class="score-btn ${myScore===i?'active':''}"
                onclick="submitVote('${v.voteId}','${opt.replace(/'/g,"\\'")}',${i})">${i}</button>`;
            }
            html += `</div>`;
          }

          html += `<div style="font-size:0.7rem;color:var(--text-sub);margin-top:4px">
              평균 ${sc.avg}점 (${sc.count}명)
            </div>
            <div class="vote-result-bar" style="width:${barW}%"></div>
          </div>`;
        });

        if (state.isAdmin) {
          html += `<div style="margin-top:10px;text-align:right">
            <button class="btn btn-danger btn-sm" onclick="deleteVote('${v.voteId}')">투표 삭제</button>
          </div>`;
        }
        html += `</div>`;
      });
    }

    document.getElementById('voteTabContent').innerHTML = html;
  } catch(e) {
    document.getElementById('voteTabContent').innerHTML = `<div class="empty-state"><span class="emoji">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}

async function submitVote(voteId, bookTitle, score) {
  if (!state.alias) { toast('로그인 후 투표할 수 있습니다.'); return; }
  // 낙관적 UI: 버튼 즉시 업데이트
  document.querySelectorAll(`[data-vote="${voteId}"][data-book="${bookTitle}"] .score-btn`).forEach((btn, i) => {
    btn.classList.toggle('active', i + 1 === score);
  });
  await apiPost({ action: 'submitVoteResponse', voteId, alias: state.alias, bookTitle, score });
  toast('투표가 반영되었습니다.');
  state.votes = null; // 캐시 무효화
  setTimeout(() => renderVoteTab(), 1500);
}

async function deleteVote(voteId) {
  if (!confirm('이 투표를 삭제하시겠습니까?')) return;
  await apiPost({ action: 'deleteVote', voteId });
  toast('투표가 삭제되었습니다.');
  state.votes = null;
  renderVoteTab();
}

// ============================================================
// 서평 탭
// ============================================================
async function renderReviewTab() {
  showLoading('reviewTabContent');
  try {
    const dash = await getDashboard();
    const sessions = (dash.sessions || []).filter(s => s.status !== 'done');

    if (sessions.length === 0) {
      document.getElementById('reviewTabContent').innerHTML = `
        <div class="card"><div class="empty-state"><span class="emoji">📝</span>현재 진행 중인 북토크가 없습니다.</div></div>`;
      return;
    }

    // 현재 세션 (첫번째)
    const sess = sessions[0];
    const reviewData = await apiFetch({ action: 'getReviews', sessionId: sess.sessionId });
    const reviews = reviewData.reviews || [];
    const myReview = reviews.find(r => String(r.alias).trim() === String(state.alias).trim());

    let html = `
      <div class="card card-l" style="margin-bottom:14px">
        <div class="section-title">현재 북토크</div>
        <div class="book-title">${sess.bookTitle}</div>
        <div class="book-author">${sess.bookAuthor || ''}</div>
      </div>`;

    // 내 서평 or 서평 작성 버튼
    if (state.alias) {
      if (myReview) {
        html += `<div class="card card-m" style="margin-bottom:14px">
          <div class="section-title">내 서평</div>
          ${renderRatingDisplay(myReview)}
          <div class="review-comment">${myReview.comment || ''}</div>
          <div style="margin-top:10px">
            <button class="btn btn-ghost btn-sm" onclick="openEditReview('${sess.sessionId}','${myReview.alias}')">수정하기</button>
          </div>
        </div>`;
      } else {
        html += `<button class="btn btn-primary btn-block" style="margin-bottom:14px"
          onclick="openNewReview('${sess.sessionId}')">서평 작성하기</button>`;
      }
    } else {
      html += `<div style="font-size:0.78rem;color:var(--text-sub);text-align:center;margin-bottom:14px">로그인 후 서평을 작성할 수 있습니다.</div>`;
    }

    // 전체 서평 목록
    html += `<div class="card"><div class="section-title">클러버 서평 (${reviews.length})</div>`;
    if (reviews.length === 0) {
      html += `<div class="empty-state" style="padding:10px 0">아직 서평이 없습니다. 첫 번째 서평을 남겨보세요!</div>`;
    } else {
      reviews.forEach(r => {
        const canEdit = state.alias && (state.alias === r.alias || state.isAdmin);
        html += `
          <div class="review-item">
            <div class="review-header">
              <span class="review-alias">${r.alias}</span>
              ${canEdit ? `<button class="btn btn-ghost btn-sm" onclick="openEditReview('${sess.sessionId}','${r.alias}')">수정</button>` : ''}
            </div>
            ${renderRatingDisplay(r)}
            <div class="review-comment">${r.comment || ''}</div>
          </div>`;
      });
    }
    html += `</div>`;

    document.getElementById('reviewTabContent').innerHTML = html;
  } catch(e) {
    document.getElementById('reviewTabContent').innerHTML = `<div class="empty-state"><span class="emoji">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}

function renderRatingDisplay(review) {
  const items = [
    { key: 'r_gamdon', label: '감동', color: 'lavender' },
    { key: 'r_jeonhwan', label: '전환', color: 'mint' },
    { key: 'r_saeroun', label: '새로움', color: 'gold' },
  ];
  return items.map(item => {
    const val = parseInt(review[item.key]) || 0;
    const dots = Array.from({length:5}, (_,i) =>
      `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;
        border:1.5px solid var(--${item.color});
        background:${i<val?`var(--${item.color})`:'transparent'};
        margin-right:3px"></span>`
    ).join('');
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:0.72rem;color:var(--text-sub);width:42px">${item.label}</span>
      <span>${dots}</span>
      <span style="font-size:0.72rem;color:var(--text-sub)">${val}점</span>
    </div>`;
  }).join('');
}

function openNewReview(sessionId) {
  if (!state.alias) { toast('로그인이 필요합니다.'); return; }
  state.reviewRatings = { gamdon: 0, jeonhwan: 0, saeroun: 0 };
  document.getElementById('reviewSessionId').value = sessionId;
  document.getElementById('reviewMode').value = 'new';
  document.getElementById('reviewModalTitle').textContent = '서평 작성';
  document.getElementById('reviewComment').value = '';
  document.getElementById('commentCount').textContent = '0';
  document.getElementById('btnReviewConfirm').textContent = '서평 등록';
  renderRatingDots();
  openModal('modalReview');
}

async function openEditReview(sessionId, alias) {
  const reviewData = await apiFetch({ action: 'getReviews', sessionId });
  const reviews = reviewData.reviews || [];
  const r = reviews.find(rv => String(rv.alias).trim() === String(alias).trim());
  if (!r) { toast('서평을 찾을 수 없습니다.'); return; }

  state.reviewRatings = {
    gamdon: parseInt(r.r_gamdon) || 0,
    jeonhwan: parseInt(r.r_jeonhwan) || 0,
    saeroun: parseInt(r.r_saeroun) || 0,
  };
  document.getElementById('reviewSessionId').value = sessionId;
  document.getElementById('reviewMode').value = 'edit';
  document.getElementById('reviewModalTitle').textContent = '서평 수정';
  document.getElementById('reviewComment').value = r.comment || '';
  document.getElementById('commentCount').textContent = (r.comment || '').length;
  document.getElementById('btnReviewConfirm').textContent = '수정 저장';
  // alias 보관 (수정시 필요)
  document.getElementById('reviewMode').dataset.alias = alias;
  renderRatingDots();
  openModal('modalReview');
}

function renderRatingDots() {
  const configs = [
    { id: 'dots-gamdon', key: 'gamdon', color: '' },
    { id: 'dots-jeonhwan', key: 'jeonhwan', color: 'mint' },
    { id: 'dots-saeroun', key: 'saeroun', color: 'gold' },
  ];
  configs.forEach(cfg => {
    const el = document.getElementById(cfg.id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const dot = document.createElement('span');
      dot.className = 'dot' + (i <= state.reviewRatings[cfg.key] ? ' filled' : '');
      dot.addEventListener('click', () => {
        state.reviewRatings[cfg.key] = i;
        renderRatingDots();
      });
      el.appendChild(dot);
    }
  });
}

async function renderLibraryTab() {
  showLoading('libraryTabContent');
  try {
    const data = await getLibraryData(true);
    const active  = data.active  || [];
    const archive = data.archive || [];

    let html = '';

    // 2026.4 이후 (library_active)
    html += `<div style="font-size:0.78rem;font-weight:700;color:var(--lavender);margin-bottom:8px">2026.4 ~</div>`;
    if (active.length === 0) {
      html += `<div class="card"><div class="empty-state" style="padding:12px 0">완료된 북토크가 없습니다.</div></div>`;
    } else {
      active.slice().reverse().forEach(item => {
        const rid = 'lib_' + item.sessionId;
        html += `
          <div class="lib-item" onclick="toggleLibReviews('${rid}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div style="flex:1">
                <div style="font-size:0.7rem;color:var(--text-sub);margin-bottom:2px">${item.month || ''}</div>
                <div class="book-title">${item.bookTitle}</div>
                <div class="book-author">${item.bookAuthor || ''}</div>
              </div>
              <div style="text-align:right;flex-shrink:0;margin-left:10px">
                <div class="avg-badge">★ ${item.avgRating}</div>
                <div style="font-size:0.7rem;color:var(--text-sub);margin-top:3px">${item.attendeeCount}명</div>
              </div>
            </div>
            <div class="lib-reviews" id="${rid}">`;

        const revs = item.reviews || [];
        if (revs.length === 0) {
          html += `<div style="font-size:0.78rem;color:var(--text-sub);padding:8px 0">서평이 없습니다.</div>`;
        } else {
          revs.forEach(r => {
            html += `
              <div class="review-item">
                <div class="review-header">
                  <span class="review-alias">${r.alias}</span>
                  <span class="avg-badge">${r.avgRating}점</span>
                </div>
                ${renderRatingDisplay(r)}
                <div class="review-comment">${r.comment || ''}</div>
              </div>`;
          });
        }
        html += `</div></div>`;
      });
    }

    // ~2026.3 (sessions_archive)
    if (archive.length > 0) {
      const byYear = {};
      archive.forEach(a => {
        const y = a.year || '기타';
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(a);
      });

      html += `<div style="font-size:0.78rem;font-weight:700;color:var(--text-sub);margin:18px 0 8px">~ 2026.3</div>`;
      Object.entries(byYear).sort((a,b) => b[0]-a[0]).forEach(([year, items]) => {
        html += `<div class="archive-year">${year}년</div>`;
        items.forEach(a => {
          html += `
            <div class="archive-item">
              <div style="font-size:0.7rem;color:var(--text-sub)">${a.month || ''}</div>
              <div class="book-title">${a.bookTitle}</div>
              <div class="book-author">${a.bookAuthor || ''}</div>
            </div>`;
        });
      });
    }

    document.getElementById('libraryTabContent').innerHTML = html;
  } catch(e) {
    document.getElementById('libraryTabContent').innerHTML = `<div class="empty-state"><span class="emoji">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}

function toggleLibReviews(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function openCurrentBookModal(type) {
  document.getElementById('currentBookType').value = type;
  document.getElementById('currentBookModalTitle').textContent = type === 'current' ? '이달의 책 설정' : '다음달 책 설정';
  document.getElementById('cbTitle').value = '';
  document.getElementById('cbAuthor').value = '';
  document.getElementById('cbMonth').value = '';

  // 현재 값으로 채우기
  const src = type === 'current' ? state.dashboard?.currentBook : state.dashboard?.nextBook;
  if (src) {
    document.getElementById('cbTitle').value = src.bookTitle || src.title || '';
    document.getElementById('cbAuthor').value = src.bookAuthor || src.author || '';
    document.getElementById('cbMonth').value = src.month || '';
  }
  openModal('modalCurrentBook');
}

function openSessionModal(sessionId) {
  document.getElementById('sessionModalId').value = sessionId || '';
  document.getElementById('sessionModalTitle').textContent = sessionId ? '세션 수정' : '세션 생성';
  document.getElementById('sessionBookTitle').value = '';
  document.getElementById('sessionBookAuthor').value = '';
  document.getElementById('sessionDate1').value = '';
  document.getElementById('sessionDate2').value = '';
  document.getElementById('btnSessionConfirm').textContent = sessionId ? '수정 저장' : '세션 생성';

  if (sessionId && state.dashboard) {
    const s = (state.dashboard.sessions || []).find(x => x.sessionId === sessionId);
    if (s) {
      document.getElementById('sessionBookTitle').value = s.bookTitle || '';
      document.getElementById('sessionBookAuthor').value = s.bookAuthor || '';
      document.getElementById('sessionDate1').value = s.date1 || '';
      document.getElementById('sessionDate2').value = s.date2 || '';
    }
  }
  openModal('modalSession');
}

function openVoteCreateModal() {
  document.getElementById('voteTitle').value = '';
  document.getElementById('voteDeadline').value = '';

  const recs = state.dashboard?.recommendations || [];
  let listHtml = '';
  if (recs.length === 0) {
    listHtml = `<div style="font-size:0.78rem;color:var(--text-sub)">추천된 책이 없습니다.</div>`;
  } else {
    recs.forEach((r, i) => {
      listHtml += `
        <div class="check-item" onclick="toggleVoteCheck(${i})">

function toggleVoteCheck(i) {
  const el = document.getElementById('vc_' + i);
  if (el) el.classList.toggle('checked');
}

async function completeSession(sessionId) {
  if (!confirm('이 세션을 완료 처리하시겠습니까?\n라이브러리에 아카이브되고, 다음달 책이 이달의 책으로 승격됩니다.')) return;
  await apiPost({ action: 'completeSession', sessionId });
  toast('세션이 완료 처리되었습니다.');
  state.dashboard = null; state.library = null;
  renderAdminTab();
}

async function deleteSession(sessionId) {
  if (!confirm('이 세션을 삭제하시겠습니까?')) return;
  await apiPost({ action: 'deleteSession', sessionId });
  toast('세션이 삭제되었습니다.');
  state.dashboard = null;
  renderAdminTab();
}

async function resetReviews(sessionId, bookTitle) {
  if (!confirm(`"${bookTitle}" 세션의 서평을 모두 초기화하시겠습니까?`)) return;
  await apiPost({ action: 'resetReviews', sessionId });
  toast('서평이 초기화되었습니다.');
  renderAdminTab();
}

function updateHeader() {
  const hr = document.getElementById('headerRight');
  if (state.alias) {
    hr.innerHTML = `
      <span class="alias-badge">${state.alias}</span>
      <button class="btn-logout" id="btnLogout">로그아웃</button>`;
    document.getElementById('btnLogout').addEventListener('click', logout);
  } else {
    hr.innerHTML = `<button class="btn-login" id="btnLoginOpen">로그인</button>`;
    document.getElementById('btnLoginOpen').addEventListener('click', () => openModal('loginOverlay'));
  }

  // 관리자 탭 표시
  const adminTab = document.getElementById('tabAdminBtn');
  if (adminTab) adminTab.style.display = state.isAdmin ? '' : 'none';
}

function logout() {
  state.alias = ''; state.isAdmin = false;
  localStorage.removeItem('ieum_alias');
  updateHeader();
  toast('로그아웃되었습니다.');
  if (state.currentTab === 'tab-admin') switchTab('tab-book');
  else renderTab(state.currentTab);
}

// ============================================================
// 이벤트 바인딩
// ============================================================
document.addEventListener('DOMContentLoaded', () => {

  // 탭 전환
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // 로그인 열기
  document.getElementById('btnLoginOpen').addEventListener('click', () => {
    document.getElementById('loginAlias').value = '';
    document.getElementById('loginPw').value = '';
    document.getElementById('loginError').style.display = 'none';
    openModal('loginOverlay');
  });

  // 로그인 확인
  document.getElementById('btnLoginConfirm').addEventListener('click', () => {
    const alias = document.getElementById('loginAlias').value.trim();
    const pw    = document.getElementById('loginPw').value.trim();
    const errEl = document.getElementById('loginError');

    if (!alias) { errEl.textContent = '별칭을 입력해주세요.'; errEl.style.display = 'block'; return; }
    if (!pw)    { errEl.textContent = '비밀번호를 입력해주세요.'; errEl.style.display = 'block'; return; }

    // 관리자 검증
    if (alias === ADMIN_ALIAS) {
      if (pw !== ADMIN_PW) { errEl.textContent = '비밀번호가 틀렸습니다.'; errEl.style.display = 'block'; return; }
      state.alias = alias; state.isAdmin = true;
    } else {
      // 일반 클러버: 비번 공통 체크 (필요시 수정)
      if (pw !== '1111' && pw !== alias) {
        // 간단히 비번 = 별칭 뒤 4자리 or 1111 허용
        // 실제 서비스에서는 Google Sheets에서 검증해야 하지만
        // 현재 구조상 프론트 검증만 수행
        // 여기서는 비번을 '1111' 또는 별칭으로 통일
        errEl.textContent = '비밀번호가 틀렸습니다. (기본: 1111)';
        errEl.style.display = 'block';
        return;
      }
      state.alias = alias; state.isAdmin = false;
    }

    localStorage.setItem('ieum_alias', alias);
    closeModal('loginOverlay');
    updateHeader();
    toast(`${alias}님, 환영합니다!`);
    renderTab(state.currentTab);
  });

  // 엔터키
  document.getElementById('loginPw').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnLoginConfirm').click();
  });

  // 로그인 취소
  document.getElementById('btnLoginCancel').addEventListener('click', () => closeModal('loginOverlay'));

  // 회원 등록 열기
  document.getElementById('btnRegisterOpen').addEventListener('click', () => {
    closeModal('loginOverlay');
    openModal('modalRegister');
  });
  document.getElementById('btnRegisterClose').addEventListener('click', () => closeModal('modalRegister'));

  // 회원 등록 확인
  document.getElementById('btnRegisterConfirm').addEventListener('click', async () => {
    const alias = document.getElementById('regAlias').value.trim();
    const name  = document.getElementById('regName').value.trim();
    if (!alias || !name) { toast('별칭과 이름은 필수입니다.'); return; }
    document.getElementById('btnRegisterConfirm').textContent = '등록 중...';
    await apiPost({
      action: 'registerMember', alias, name,
      birth: document.getElementById('regBirth').value.trim(),
      gender: document.getElementById('regGender').value,
      emotionalLabor: document.getElementById('regEmotional').value.trim(),
    });
    toast('등록 요청이 전송되었습니다. 잠시 후 로그인해주세요.');
    closeModal('modalRegister');
    document.getElementById('btnRegisterConfirm').textContent = '등록하기';
    setTimeout(() => openModal('loginOverlay'), 500);
  });

  // 추천 등록
  document.getElementById('btnRecClose').addEventListener('click', () => closeModal('modalRec'));
  document.getElementById('btnRecConfirm').addEventListener('click', async () => {
    if (!state.alias) { toast('로그인이 필요합니다.'); return; }
    const title = document.getElementById('recTitle').value.trim();
    if (!title) { toast('책 제목을 입력해주세요.'); return; }
    document.getElementById('btnRecConfirm').textContent = '등록 중...';
    await apiPost({
      action: 'addRecommendation',
      alias: state.alias,
      title,
      author: document.getElementById('recAuthor').value.trim(),
      pub: document.getElementById('recPub').value.trim(),
      reason: document.getElementById('recReason').value.trim(),
    });
    toast('추천이 등록되었습니다.');
    closeModal('modalRec');
    document.getElementById('btnRecConfirm').textContent = '추천 등록';
    state.dashboard = null;
    setTimeout(() => renderRecTab(), 1500);
  });

  // 서평 모달 닫기
  document.getElementById('btnReviewClose').addEventListener('click', () => closeModal('modalReview'));

  // 서평 자수 카운터
  document.getElementById('reviewComment').addEventListener('input', function() {
    document.getElementById('commentCount').textContent = this.value.length;
  });

  // 서평 등록/수정
  document.getElementById('btnReviewConfirm').addEventListener('click', async () => {
    if (!state.alias) { toast('로그인이 필요합니다.'); return; }
    const sessionId = document.getElementById('reviewSessionId').value;
    const mode = document.getElementById('reviewMode').value;
    const comment = document.getElementById('reviewComment').value.trim();

    if (!state.reviewRatings.gamdon && !state.reviewRatings.jeonhwan && !state.reviewRatings.saeroun) {
      toast('별점을 하나 이상 선택해주세요.'); return;
    }

    const body = {
      action: mode === 'edit' ? 'updateReview' : 'submitReview',
      sessionId,
      alias: mode === 'edit' ? document.getElementById('reviewMode').dataset.alias : state.alias,
      r_gamdon: state.reviewRatings.gamdon,
      r_jeonhwan: state.reviewRatings.jeonhwan,
      r_saeroun: state.reviewRatings.saeroun,
      comment,
      isAdmin: state.isAdmin,
    };

    document.getElementById('btnReviewConfirm').textContent = '저장 중...';
    await apiPost(body);

    // 낙관적 업데이트
    closeModal('modalReview');
    toast(mode === 'edit' ? '서평이 수정되었습니다.' : '서평이 등록되었습니다.');
    document.getElementById('btnReviewConfirm').textContent = mode === 'edit' ? '수정 저장' : '서평 등록';
    setTimeout(() => renderReviewTab(), 1500);
  });

  // 투표 생성
  document.getElementById('btnVoteCreateClose').addEventListener('click', () => closeModal('modalVoteCreate'));
  document.getElementById('btnVoteCreateConfirm').addEventListener('click', async () => {
    const title = document.getElementById('voteTitle').value.trim();
    if (!title) { toast('투표 제목을 입력해주세요.'); return; }

    // 체크된 항목 수집
    const recsJson = document.getElementById('voteOptionsList').dataset.recs;
    const recs = recsJson ? JSON.parse(recsJson) : [];
    const selected = [];
    recs.forEach((t, i) => {
      const el = document.getElementById('vc_' + i);
      if (el && el.classList.contains('checked')) selected.push(t);
    });

    if (selected.length < 2) { toast('2개 이상 선택해주세요.'); return; }

    document.getElementById('btnVoteCreateConfirm').textContent = '생성 중...';
    await apiPost({
      action: 'createVote',
      title,
      options: selected,
      deadline: document.getElementById('voteDeadline').value,
    });
    toast('투표가 생성되었습니다.');
    closeModal('modalVoteCreate');
    document.getElementById('btnVoteCreateConfirm').textContent = '투표 생성';
    state.votes = null;
    setTimeout(() => {
      renderAdminTab();
      if (state.currentTab === 'tab-vote') renderVoteTab();
    }, 1500);
  });

  // 세션 모달
  document.getElementById('btnSessionClose').addEventListener('click', () => closeModal('modalSession'));
  document.getElementById('btnSessionConfirm').addEventListener('click', async () => {
    const sessionId = document.getElementById('sessionModalId').value;
    const bookTitle = document.getElementById('sessionBookTitle').value.trim();
    if (!bookTitle) { toast('책 제목을 입력해주세요.'); return; }

    const body = {
      action: sessionId ? 'updateSession' : 'createSession',
      bookTitle,
      bookAuthor: document.getElementById('sessionBookAuthor').value.trim(),
      date1: document.getElementById('sessionDate1').value,
      date2: document.getElementById('sessionDate2').value,
    };
    if (sessionId) body.sessionId = sessionId;

    document.getElementById('btnSessionConfirm').textContent = '저장 중...';
    await apiPost(body);
    toast(sessionId ? '세션이 수정되었습니다.' : '세션이 생성되었습니다.');
    closeModal('modalSession');
    document.getElementById('btnSessionConfirm').textContent = '저장';
    state.dashboard = null;
    setTimeout(() => renderAdminTab(), 1500);
  });

  // 이달의 책 모달
  document.getElementById('btnCurrentBookClose').addEventListener('click', () => closeModal('modalCurrentBook'));
  document.getElementById('btnCurrentBookConfirm').addEventListener('click', async () => {
    const type = document.getElementById('currentBookType').value;
    const title = document.getElementById('cbTitle').value.trim();
    if (!title) { toast('책 제목을 입력해주세요.'); return; }

    const body = type === 'current'
      ? { action: 'setCurrentBook', bookTitle: title, bookAuthor: document.getElementById('cbAuthor').value.trim(), month: document.getElementById('cbMonth').value.trim() }
      : { action: 'setNextBook', title, author: document.getElementById('cbAuthor').value.trim(), month: document.getElementById('cbMonth').value.trim() };

    document.getElementById('btnCurrentBookConfirm').textContent = '저장 중...';
    await apiPost(body);
    toast('저장되었습니다.');
    closeModal('modalCurrentBook');
    document.getElementById('btnCurrentBookConfirm').textContent = '저장';
    state.dashboard = null;
    setTimeout(() => { renderAdminTab(); renderBookTab(); }, 1500);
  });

  // 모달 바깥 클릭 닫기
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('show');
    });
  });

  // 초기 렌더
  updateHeader();
  renderBookTab();
});
</script>
</body>
</html>

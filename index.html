<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이음북클럽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300&family=Nanum+Myeongjo&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F9F8F6;
            --main-text: #4B3621; /* 부드러운 중간 톤 브라운 */
            --lavender: #9B8C9C;
            --mint: #829A88;
            --line: #EAE6E1;
        }

        body { background: var(--bg); margin: 0; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; color: var(--main-text); display: flex; justify-content: center; min-height: 100vh; }
        .app-frame { width: 100%; max-width: 480px; padding: 60px 20px; text-align: center; box-sizing: border-box; }
        
        h1 { font-family: 'Nanum Myeongjo', serif; font-weight: 400; font-size: 2.2rem; color: #2F3E30; margin-bottom: 80px; letter-spacing: 4px; cursor: pointer; }
        
        /* 버튼 상하 배치 */
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .btn-base { background: transparent; padding: 14px 0; width: 220px; font-size: 1rem; letter-spacing: 10px; cursor: pointer; transition: 0.4s; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; border-radius: 0; color: var(--main-text); }
        .btn-first { border: 1px solid var(--lavender); }
        .btn-ieum { border: 1px solid var(--mint); }
        
        /* 입력창 가운데 맞춤 및 예시 텍스트 크기 조절 */
        .input-group { margin-bottom: 30px; text-align: center; width: 100%; }
        .input-label { font-size: 0.85rem; color: var(--lavender); margin-bottom: 10px; display: block; letter-spacing: 1px; }
        input { background: transparent; border: none; border-bottom: 1px solid var(--line); padding: 8px 0; color: var(--main-text); font-weight: 300; outline: none; font-size: 1.1rem; width: 85%; box-sizing: border-box; text-align: center; }
        input::placeholder { color: #D1CDCA; font-size: 1.1rem; }
        input:focus { border-bottom: 1px solid var(--mint); }

        .hidden { display: none !important; }
        .section-title { font-size: 0.9rem; color: var(--lavender); margin: 30px 0 40px 0; border-bottom: 1px solid var(--line); padding-bottom: 8px; text-align: center; width: 80%; margin-left: auto; margin-right: auto; }
        #msg-area { font-size: 0.85rem; margin-top: 20px; color: var(--lavender); min-height: 1.5rem; }
    </style>
</head>
<body>

<div class="app-frame">
    <h1 onclick="location.reload()">이음북클럽</h1>

    <div id="home-screen" class="btn-container">
        <button class="btn-base btn-first" onclick="showScreen('register-screen')">처음</button>
        <button class="btn-base btn-ieum" onclick="showScreen('login-screen')">이음</button>
    </div>

    <div id="register-screen" class="hidden">
        <div class="section-title">멤버 정보 등록</div>
        <div class="input-group">
            <span class="input-label">사용할 별칭</span>
            <input type="text" id="reg-alias" placeholder="생뚱">
        </div>
        <div class="input-group">
            <span class="input-label">성함</span>
            <input type="text" id="reg-name" placeholder="실명 입력">
        </div>
        <div class="input-group">
            <span class="input-label">출생년도</span>
            <input type="text" id="reg-birth" placeholder="1985">
        </div>
        <div class="input-group">
            <span class="input-label">하는 일</span>
            <input type="text" id="reg-work" placeholder="하는 일 입력">
        </div>
        <div class="input-group">
            <span class="input-label">성별</span>
            <input type="text" id="reg-gender" placeholder="남 또는 여">
        </div>
        <div class="input-group">
            <span class="input-label">감정노동자</span>
            <input type="text" id="reg-emo" placeholder="예 또는 아니오">
        </div>
        <button class="btn-base btn-first" onclick="handleRegister()">등록하기</button>
        <button class="btn-base" style="border:none; font-size:0.8rem; color:var(--lavender); letter-spacing:2px;" onclick="showScreen('home-screen')">이전으로</button>
    </div>

    <div id="login-screen" class="hidden">
        <div class="section-title">이음(로그인)</div>
        <div class="input-group">
            <span class="input-label">별칭 입력</span>
            <input type="text" id="login-alias" placeholder="별칭을 입력하세요">
        </div>
        <button class="btn-base btn-ieum" onclick="handleLogin()">참여하기</button>
        <button class="btn-base" style="border:none; font-size:0.8rem; color:var(--lavender); letter-spacing:2px;" onclick="showScreen('home-screen')">이전으로</button>
    </div>

    <div id="dashboard-screen" class="hidden">
        <p id="welcome-msg" style="text-align: center; margin-bottom: 40px; font-size: 1.2rem;"></p>
        <div class="section-title">참여 공간</div>
        <p style="color: var(--lavender);">준비 중인 페이지입니다.</p>
    </div>

    <div id="msg-area"></div>
</div>

<script>
    // 사용자님이 새로 발급받으신 최종 URL이 적용되었습니다.
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrEH9N14O_PHK8cM8qatzUZMrH2KgFDWvNcf_f5KWmkCCa0YFBPvlNheeUxosLH3yYw/exec";

    function showScreen(id) {
        ['home-screen', 'register-screen', 'login-screen', 'dashboard-screen'].forEach(s => {
            const el = document.getElementById(s);
            if (el) s === id ? el.classList.remove('hidden') : el.classList.add('hidden');
        });
        document.getElementById('msg-area').innerText = "";
    }

    async function handleRegister() {
        const alias = document.getElementById('reg-alias').value;
        const name = document.getElementById('reg-name').value;
        const birth = document.getElementById('reg-birth').value;
        const work = document.getElementById('reg-work').value;
        const gender = document.getElementById('reg-gender').value;
        const isEmotionalWorker = document.getElementById('reg-emo').value;

        if(!alias || !name) { alert("별칭과 성함은 필수입니다."); return; }

        document.getElementById('msg-area').innerText = "정보를 등록하고 있습니다...";
        
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `action=register&alias=${encodeURIComponent(alias)}&name=${encodeURIComponent(name)}&birth=${encodeURIComponent(birth)}&work=${encodeURIComponent(work)}&gender=${encodeURIComponent(gender)}&isEmotionalWorker=${encodeURIComponent(isEmotionalWorker)}`
            });
            document.getElementById('msg-area').innerText = "등록 완료! 로그인 화면으로 이동합니다.";
            setTimeout(() => showScreen('login-screen'), 1500);
        } catch(e) { 
            document.getElementById('msg-area').innerText = "연결 오류가 발생했습니다."; 
        }
    }

    async function handleLogin() {
        const alias = document.getElementById('login-alias').value;
        if(!alias) return;

        document.getElementById('msg-area').innerText = "클러버 명부를 확인 중입니다...";
        
        try {
            // CORS 및 리다이렉트 문제를 해결하기 위해 redirect: 'follow'를 사용합니다.
            const response = await fetch(`${SCRIPT_URL}?action=login&alias=${encodeURIComponent(alias)}`, {
                method: 'GET',
                redirect: 'follow'
            });
            
            const text = await response.text();
            const result = JSON.parse(text);

            if(result.status === 'success') {
                document.getElementById('welcome-msg').innerText = `${result.data.alias} 님, 반갑습니다.`;
                showScreen('dashboard-screen');
            } else {
                document.getElementById('msg-area').innerText = result.message;
            }
        } catch(e) {
            console.error(e);
            document.getElementById('msg-area').innerText = "통신 오류가 발생했습니다. 앱스 스크립트 배포 설정을 확인해주세요.";
        }
    }

    window.onload = () => showScreen('home-screen');
</script>
</body>
</html>

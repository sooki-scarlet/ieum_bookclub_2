<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>이음북클럽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── 변수 ─────────────────────────────────────────── */
:root {
  --bg:       #F9F8F6;
  --lavender: #6A5D6B;
  --mint:     #4A6352;
  --gold:     #C8952A;
  --text:     #2C2C2C;
  --sub:      #6B6B6B;
  --border:   #DDD8D0;
  --card:     #FFFFFF;
  --shadow:   0 2px 12px rgba(0,0,0,0.06);
  --r:        10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:76px;
}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;font-size:.875rem;outline:none}

/* ── 헤더 ─────────────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:13px 16px 9px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1.2rem;
      letter-spacing:.04em;color:var(--lavender)}
.logo span{color:var(--mint)}
.hdr-r{display:flex;align-items:center;gap:8px}
.badge{font-size:.72rem;background:var(--lavender);color:#fff;
       padding:3px 10px;border-radius:20px;font-weight:500}
.btn-xs{font-size:.72rem;padding:3px 11px;border-radius:20px;
        border:1px solid var(--border);background:transparent;
        color:var(--sub);transition:all .2s}
.btn-xs:hover{border-color:var(--lavender);color:var(--lavender)}
.btn-xs.out:hover{border-color:#c00;color:#c00}

/* ── 탭 네비 ──────────────────────────────────────── */
.tabs{
  display:flex;overflow-x:auto;scrollbar-width:none;
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:0 6px;position:sticky;top:52px;z-index:199;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:10px 13px;font-size:.78rem;font-weight:500;
  color:var(--sub);background:transparent;border:none;
  border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;
}
.tab.on{color:var(--lavender);border-bottom-color:var(--lavender);font-weight:600}

/* ── 패널 ─────────────────────────────────────────── */
.panel{display:none;padding:16px}
.panel.on{display:block}

/* ── 카드 ─────────────────────────────────────────── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
      padding:15px;margin-bottom:12px}
.card.lv{border-left:2px solid var(--lavender)}
.card.mn{border-left:2px solid var(--mint)}
.card.gd{border-left:2px solid var(--gold)}

.sec-ttl{font-size:.68rem;font-weight:700;letter-spacing:.08em;
         text-transform:uppercase;color:var(--sub);margin-bottom:8px}
.bk-ttl{font-family:'Nanum Myeongjo',serif;font-weight:700;
        font-size:1.05rem;color:var(--text);line-height:1.4}
.bk-au{font-size:.76rem;color:var(--sub);margin-top:2px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;
     font-size:.68rem;font-weight:600}
.tag.lv{background:#EDE8EE;color:var(--lavender)}
.tag.mn{background:#E6EDEA;color:var(--mint)}
.tag.gd{background:#FBF3E3;color:var(--gold)}

/* ── 폼 ───────────────────────────────────────────── */
.fg{margin-bottom:11px}
.fl{display:block;font-size:.73rem;font-weight:600;color:var(--sub);margin-bottom:4px}
.fi,.fs,.ft{
  width:100%;padding:8px 11px;
  border:1px solid var(--border);border-radius:7px;
  background:#fff;color:var(--text);font-size:.86rem;transition:border-color .2s;
}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--lavender)}
.ft{resize:vertical;min-height:68px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── 버튼 ─────────────────────────────────────────── */
.btn{display:inline-block;padding:9px 18px;border-radius:8px;
     font-size:.82rem;font-weight:600;border:none;transition:all .2s;text-align:center}
.btn.prim{background:var(--lavender);color:#fff}.btn.prim:hover{background:#5a4e5b}
.btn.mn  {background:var(--mint);color:#fff}.btn.mn:hover{background:#3c5344}
.btn.gd  {background:var(--gold);color:#fff}.btn.gd:hover{background:#a97d22}
.btn.gh  {background:transparent;border:1px solid var(--border);color:var(--sub)}
.btn.gh:hover{border-color:var(--lavender);color:var(--lavender)}
.btn.dng {background:#c0392b;color:#fff}.btn.dng:hover{background:#a93226}
.btn.sm  {padding:5px 11px;font-size:.73rem}
.btn.blk {display:block;width:100%}

/* ── 스피너 ───────────────────────────────────────── */
.spin-wrap{text-align:center;padding:30px;color:var(--sub)}
.spin{display:inline-block;width:20px;height:20px;
      border:2px solid var(--border);border-top-color:var(--lavender);
      border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── 토스트 ───────────────────────────────────────── */
#toast{
  position:fixed;bottom:84px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:#2C2C2C;color:#fff;padding:9px 20px;
  border-radius:22px;font-size:.8rem;
  opacity:0;transition:all .28s;z-index:9999;
  white-space:nowrap;pointer-events:none;
  max-width:calc(100vw - 36px);
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 별점 점 ──────────────────────────────────────── */
.dots{display:flex;gap:5px;align-items:center}
.dot{
  width:11px;height:11px;border-radius:50%;
  border:1.5px solid var(--lavender);background:transparent;
  cursor:pointer;transition:background .12s, transform .1s;flex-shrink:0;
}
.dot:hover{transform:scale(1.2)}
.dot.on{background:var(--lavender)}
.dots.mn .dot{border-color:var(--mint)}.dots.mn .dot.on{background:var(--mint)}
.dots.gd .dot{border-color:var(--gold)}.dots.gd .dot.on{background:var(--gold)}

.r-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.r-lbl{font-size:.78rem;color:var(--sub);font-weight:500;width:52px}

/* ── 모달 ─────────────────────────────────────────── */
.mo{display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.42);z-index:1000;
    align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.mbox{
  background:var(--card);width:100%;max-width:480px;
  border-radius:16px 16px 0 0;padding:18px 16px 30px;
  max-height:88vh;overflow-y:auto;
  animation:sup .24s ease;
}
@keyframes sup{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mttl{font-size:.95rem;font-weight:700}
.mcls{width:26px;height:26px;border-radius:50%;border:none;
      background:var(--bg);color:var(--sub);font-size:.9rem}

/* ── 로그인 오버레이 ──────────────────────────────── */
.lo{display:none;position:fixed;inset:0;
    background:rgba(249,248,246,.97);z-index:2000;
    flex-direction:column;align-items:center;justify-content:center;padding:28px}
.lo.on{display:flex}
.lo-logo{font-family:'Nanum Myeongjo',serif;font-size:1.7rem;font-weight:800;
         color:var(--lavender);margin-bottom:6px;text-align:center}
.lo-sub{font-size:.78rem;color:var(--sub);margin-bottom:28px;text-align:center}
.lo-box{width:100%;max-width:310px}
.lo-err{color:#c0392b;font-size:.76rem;margin-bottom:8px;display:none}

/* ── 구분선 ───────────────────────────────────────── */
.div{height:1px;background:var(--border);margin:13px 0}

/* ── 빈 상태 ──────────────────────────────────────── */
.empty{text-align:center;padding:24px 12px;color:var(--sub);font-size:.8rem}
.empty .ico{font-size:1.8rem;display:block;margin-bottom:7px}

/* ════════════════════════════════════════════════════
   이음책 탭
════════════════════════════════════════════════════ */
.cur-card{
  background:linear-gradient(135deg,#EDE8EE 0%,#F9F8F6 100%);
  border-radius:var(--r);padding:18px;margin-bottom:12px;
  border-left:2px solid var(--lavender);position:relative;overflow:hidden;
}
.cur-card::after{content:'📚';position:absolute;right:14px;bottom:10px;
                 font-size:2.2rem;opacity:.12;pointer-events:none}
.cur-card .bk-ttl{font-size:1.15rem}

.sess-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.sess-row:last-child{border-bottom:none}
.sess-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--lavender);color:#fff;
  font-size:.68rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sess-num.mn{background:var(--mint)}

/* ════════════════════════════════════════════════════
   서평 탭
════════════════════════════════════════════════════ */
.rev-item{padding:11px 0;border-bottom:1px solid var(--border)}
.rev-item:last-child{border-bottom:none}
.rev-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.rev-alias{font-size:.82rem;font-weight:600;color:var(--lavender)}
.rev-txt{font-size:.8rem;color:var(--text);line-height:1.65;margin-top:5px}
.avg-b{font-size:.7rem;font-weight:700;
       background:var(--bg);border:1px solid var(--border);
       padding:2px 8px;border-radius:10px}

/* 점수 표시 (읽기전용) */
.rdots{display:flex;gap:4px;align-items:center}
.rdot{width:10px;height:10px;border-radius:50%;
      border:1.5px solid var(--lavender);background:transparent;flex-shrink:0}
.rdot.on{background:var(--lavender)}
.rdots.mn .rdot{border-color:var(--mint)}.rdots.mn .rdot.on{background:var(--mint)}
.rdots.gd .rdot{border-color:var(--gold)}.rdots.gd .rdot.on{background:var(--gold)}
.r-disp-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.r-disp-lbl{font-size:.7rem;color:var(--sub);width:40px;flex-shrink:0}

/* ════════════════════════════════════════════════════
   추천 탭
════════════════════════════════════════════════════ */
.rec-item{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:11px 0;border-bottom:1px solid var(--border);
}
.rec-item:last-child{border-bottom:none}

/* ════════════════════════════════════════════════════
   투표 탭
════════════════════════════════════════════════════ */
.vote-opt{
  padding:10px 12px;border:1px solid var(--border);
  border-radius:8px;margin-bottom:8px;
}
.vote-opt-ttl{font-size:.84rem;font-weight:600;margin-bottom:7px}
.score-row{display:flex;gap:5px;align-items:center;margin-bottom:5px}
.sc-btn{
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--border);background:transparent;
  font-size:.73rem;font-weight:600;color:var(--sub);transition:all .15s;
}
.sc-btn.on{border-color:var(--lavender);background:var(--lavender);color:#fff}
.bar-wrap{height:5px;background:#EDE8EE;border-radius:3px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;background:linear-gradient(to right,var(--lavender),var(--mint));
          transition:width .4s;border-radius:3px}
.vote-meta{font-size:.7rem;color:var(--sub);margin-top:3px}
.vote-participants{
  font-size:.73rem;color:var(--sub);
  margin-top:10px;padding-top:8px;border-top:1px dashed var(--border);
}

/* ════════════════════════════════════════════════════
   라이브러리 탭
════════════════════════════════════════════════════ */
.lib-item{
  display:flex;align-items:center;gap:0;
  padding:8px 0;border-bottom:1px solid var(--border);
  cursor:pointer;
}
.lib-item:last-child{border-bottom:none}
.lib-code{
  font-size:.7rem;color:var(--lavender);font-weight:700;
  width:36px;flex-shrink:0;
}
.lib-info{flex:1;min-width:0}
.lib-ttl{font-size:.86rem;font-weight:600;color:var(--text);
         white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-au{font-size:.72rem;color:var(--sub)}
.lib-avg{font-size:.72rem;font-weight:700;color:var(--lavender);
         flex-shrink:0;margin-left:8px}
.lib-reviews{display:none;padding:8px 0 4px 36px}
.lib-reviews.open{display:block}
.lib-chevron{font-size:.7rem;color:var(--sub);flex-shrink:0;margin-left:4px;
             transition:transform .2s}
.lib-item.open .lib-chevron{transform:rotate(90deg)}

/* 이전 아카이브 토글 */
.arch-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border-radius:8px;
  background:var(--card);border:1px solid var(--border);
  cursor:pointer;margin-bottom:8px;font-size:.82rem;font-weight:600;
  color:var(--sub);
}
.arch-toggle .arrow{transition:transform .2s;font-size:.8rem}
.arch-toggle.open .arrow{transform:rotate(90deg)}
.arch-list{display:none}
.arch-list.open{display:block}
.arch-item{
  display:flex;align-items:center;gap:0;
  padding:7px 0;border-bottom:1px dashed var(--border);
}
.arch-item:last-child{border-bottom:none}
.arch-code{font-size:.7rem;color:var(--sub);width:36px;flex-shrink:0}
.arch-ttl{font-size:.84rem;color:var(--text);white-space:nowrap;
          overflow:hidden;text-overflow:ellipsis;flex:1}
.arch-au{font-size:.72rem;color:var(--sub)}

/* ════════════════════════════════════════════════════
   관리자 탭
════════════════════════════════════════════════════ */
.adm-sec{margin-bottom:20px}
.adm-ttl{
  font-size:.7rem;font-weight:700;letter-spacing:.1em;color:var(--sub);
  text-transform:uppercase;margin-bottom:9px;padding-bottom:5px;
  border-bottom:1px solid var(--border);
}
.sess-adm{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.sess-adm:last-child{border-bottom:none}
.sess-adm-acts{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.chk-item{
  display:flex;align-items:center;gap:9px;padding:8px 0;
  border-bottom:1px dashed var(--border);cursor:pointer;
}
.chk-item:last-child{border-bottom:none}
.chkbox{
  width:17px;height:17px;border-radius:4px;
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .14s;
}
.chkbox.on{background:var(--lavender);border-color:var(--lavender)}
.chkbox.on::after{content:'✓';color:#fff;font-size:.6rem;font-weight:700}
</style>
</head>
<body>

<!-- ══ 헤더 ══ -->
<header class="hdr">
  <div class="logo">이음<span>북클럽</span></div>
  <div class="hdr-r" id="hdrR">
    <button class="btn-xs" id="btnLoIn">로그인</button>
  </div>
</header>

<!-- ══ 탭 네비 ══ -->
<!-- 순서: 이음책 / 서평 / 추천 / 투표 / 라이브러리 / 관리자 -->
<nav class="tabs" id="tabNav">
  <button class="tab on" data-tab="t-book">이음책</button>
  <button class="tab" data-tab="t-rev">서평</button>
  <button class="tab" data-tab="t-rec">추천</button>
  <button class="tab" data-tab="t-vote">투표</button>
  <button class="tab" data-tab="t-lib">라이브러리</button>
  <button class="tab" data-tab="t-adm" id="tabAdm" style="display:none">관리자</button>
</nav>

<main>
<!-- 이음책 -->
<div class="panel on" id="t-book"><div id="c-book"><div class="spin-wrap"><div class="spin"></div></div></div></div>
<!-- 서평 -->
<div class="panel" id="t-rev"><div id="c-rev"><div class="spin-wrap"><div class="spin"></div></div></div></div>
<!-- 추천 -->
<div class="panel" id="t-rec"><div id="c-rec"><div class="spin-wrap"><div class="spin"></div></div></div></div>
<!-- 투표 -->
<div class="panel" id="t-vote"><div id="c-vote"><div class="spin-wrap"><div class="spin"></div></div></div></div>
<!-- 라이브러리 -->
<div class="panel" id="t-lib"><div id="c-lib"><div class="spin-wrap"><div class="spin"></div></div></div></div>
<!-- 관리자 -->
<div class="panel" id="t-adm"><div id="c-adm"><div class="spin-wrap"><div class="spin"></div></div></div></div>
</main>

<!-- ══ 로그인 오버레이 ══ -->
<div class="lo" id="loPanel">
  <div class="lo-logo">이음북클럽</div>
  <div class="lo-sub">별칭을 입력하면 바로 입장됩니다</div>
  <div class="lo-box">
    <div class="fg"><label class="fl">별칭</label>
      <input class="fi" id="loAlias" placeholder="북클럽 별칭 입력" autocomplete="off"
        oninput="onAliasInput()"></div>
    <div class="fg" id="pwField" style="display:none">
      <label class="fl">관리자 비밀번호</label>
      <input class="fi" type="password" id="loPw" placeholder="비밀번호"></div>
    <div class="lo-err" id="loErr"></div>
    <button class="btn prim blk" id="btnLoConfirm">입장하기</button>
    <div class="div"></div>
    <p style="font-size:.73rem;color:var(--sub);text-align:center;margin-bottom:8px">아직 회원이 아니신가요?</p>
    <button class="btn gh blk" id="btnRegOpen">회원 등록</button>
    <button class="btn gh blk" style="margin-top:7px" id="btnLoCancel">닫기</button>
  </div>
</div>

<!-- ══ 회원 등록 모달 ══ -->
<div class="mo" id="moReg">
  <div class="mbox">
    <div class="mhdr"><span class="mttl">회원 등록</span><button class="mcls" id="btnRegClose">✕</button></div>
    <div class="fg"><label class="fl">별칭 *</label><input class="fi" id="rAlias" placeholder="북클럽 별칭"></div>
    <div class="fg"><label class="fl">이름 *</label><input class="fi" id="rName" placeholder="실명"></div>
    <div class="row2">
      <div class="fg"><label class="fl">생년월일</label><input class="fi" id="rBirth" placeholder="1990-01-01"></div>
      <div class="fg"><label class="fl">성별</label>
        <select class="fs" id="rGender"><option value="">선택</option>
          <option value="여">여</option><option value="남">남</option><option value="기타">기타</option>
        </select>
      </div>
    </div>
    <div class="fg"><label class="fl">감정노동 직군</label><input class="fi" id="rEmot" placeholder="예) 사회복지사, 교사"></div>
    <button class="btn prim blk" id="btnRegConfirm">등록하기</button>
  </div>
</div>

<!-- ══ 추천 등록 모달 ══ -->
<div class="mo" id="moRec">
  <div class="mbox">
    <div class="mhdr"><span class="mttl">책 추천 등록</span><button class="mcls" id="btnRecClose">✕</button></div>
    <div class="fg"><label class="fl">책 제목 *</label><input class="fi" id="rcTitle" placeholder="책 제목"></div>
    <div class="row2">
      <div class="fg"><label class="fl">저자</label><input class="fi" id="rcAuthor" placeholder="저자"></div>
      <div class="fg"><label class="fl">출판사</label><input class="fi" id="rcPub" placeholder="출판사"></div>
    </div>
    <div class="fg"><label class="fl">추천 이유</label>
      <textarea class="ft" id="rcReason" placeholder="이 책을 추천하는 이유"></textarea></div>
    <button class="btn prim blk" id="btnRecConfirm">추천 등록</button>
  </div>
</div>

<!-- ══ 서평 작성/수정 모달 ══ -->
<div class="mo" id="moRev">
  <div class="mbox">
    <div class="mhdr">
      <span class="mttl" id="revMoTtl">서평 작성</span>
      <button class="mcls" id="btnRevClose">✕</button>
    </div>
    <input type="hidden" id="revSessId">
    <input type="hidden" id="revMode"><!-- new|edit -->
    <input type="hidden" id="revEditAlias">

    <div class="r-row">
      <span class="r-lbl">💜 감동</span>

<!-- ══ 토스트 ══ -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════
// 설정 & 상태
// ════════════════════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbzDdIMiPZAVrblpXuZeUJh2zFP_gUQ9q707rKRrmh32x_-2iCDeWEQf7caGwSoeSsVO0Q/exec';
const ADMIN_ALIAS = '이음1';
const ADMIN_PW    = '1111';
const MEMBER_PW   = '1111'; // 모든 일반 멤버 공통 비번

let S = {
  alias:   localStorage.getItem('ieum_alias') || '',
  isAdmin: localStorage.getItem('ieum_alias') === ADMIN_ALIAS,
  tab:     't-book',
  dash:    null, dashTs: 0,
  lib:     null, libTs:  0,
  votes:   null, votesTs:0,
  ratings: {gamdon:0, jeonhwan:0, saeroun:0},
};
const TTL = 60000;

// ════════════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function toast(msg, ms=2400){
  const el=$('toast');
  el.textContent=msg;el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),ms);
}
function spin(id){$(id).innerHTML='<div class="spin-wrap"><div class="spin"></div></div>'}
function mo(id,open){$(id).classList.toggle('on',open)}
function fmtD(s){if(!s)return'';const p=String(s).substring(0,10).split('-');return p.length===3?`${p[1]}월 ${p[2]}일`:s}
function fmt(s){return String(s||'').substring(0,10)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
// yyyyMM 코드: 2026-04 → 2604
function monthCode(m){if(!m)return'';const p=m.split('-');if(p.length<2)return m;return p[0].slice(2)+p[1]}

// ════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════
function apiGet(params){
  return new Promise((res,rej)=>{
    const cb='_cb'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const qs=Object.entries({...params,callback:cb}).map(([k,v])=>`${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
    const sc=document.createElement('script');
    const tm=setTimeout(()=>{delete window[cb];sc.remove();rej(new Error('timeout'))},15000);
    window[cb]=d=>{clearTimeout(tm);delete window[cb];sc.remove();res(d)};
    sc.src=`${API}?${qs}`;document.head.appendChild(sc);
  });
}
function apiPost(body){
  return fetch(API,{method:'POST',mode:'no-cors',
    headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
}

// 캐시 래퍼
async function getDash(force=false){
  if(!force&&S.dash&&Date.now()-S.dashTs<TTL)return S.dash;
  const d=await apiGet({action:'getDashboard'});
  if(d.ok){S.dash=d;S.dashTs=Date.now()}
  return d;
}
async function getLib(force=false){
  if(!force&&S.lib&&Date.now()-S.libTs<TTL)return S.lib;
  const d=await apiGet({action:'getLibrary'});
  if(d.ok){S.lib=d;S.libTs=Date.now()}
  return d;
}
async function getVotes(force=false){
  if(!force&&S.votes&&Date.now()-S.votesTs<TTL)return S.votes;
  const d=await apiGet({action:'getVotes'});
  if(d.ok){S.votes=d;S.votesTs=Date.now()}
  return d;
}

// ════════════════════════════════════════════════════
// 탭 전환
// ════════════════════════════════════════════════════
function switchTab(id){
  S.tab=id;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id===id));
  renderTab(id);
}
function renderTab(id){
  ({
    't-book': renderBook,
    't-rev':  renderRev,
    't-rec':  renderRec,
    't-vote': renderVote,
    't-lib':  renderLib,
    't-adm':  renderAdm,
  }[id]||(() => {}))();
}

// ════════════════════════════════════════════════════
// 1. 이음책 탭  (이달의 책 + 북토크 일정 + 다음달 통합)
// ════════════════════════════════════════════════════
async function renderBook(){
  spin('c-book');
  try{
    const d=await getDash();
    const cb=d.currentBook||null;
    const nb=d.nextBook||null;
    const sessions=(d.sessions||[]).filter(s=>s.status!=='done');
    let h='';

    /* 이달의 책 */
    if(cb&&cb.bookTitle){
      h+=`<div class="cur-card">
        <div class="sec-ttl">📖 이달의 책</div>
        <div class="bk-ttl">${esc(cb.bookTitle)}</div>
        <div class="bk-au">${esc(cb.bookAuthor||'')}</div>
        ${cb.month?`<div style="margin-top:6px"><span class="tag lv">${esc(cb.month)}</span></div>`:''}
      </div>`;
    } else {
      h+=`<div class="card lv"><div class="empty"><span class="ico">📖</span>이달의 책이 아직 선정되지 않았습니다.</div></div>`;
    }

    /* 이달의 북토크 일정 */
    h+=`<div class="card mn"><div class="sec-ttl">🗓 이달의 북토크</div>`;
    if(sessions.length===0){
      h+=`<div class="empty" style="padding:10px 0">등록된 세션이 없습니다.</div>`;
    } else {
      sessions.forEach(s=>{
        const dates=[s.date1,s.date2].filter(Boolean);
        if(dates.length===0){
          h+=`<div class="sess-row">
            <div class="sess-num">-</div>
            <div><div style="font-size:.8rem;font-weight:600">${esc(s.bookTitle)}</div>
            <div style="font-size:.72rem;color:var(--sub)">일정 미정</div></div>
          </div>`;
        } else {
          dates.forEach((dt,i)=>{
            h+=`<div class="sess-row">
              <div class="sess-num ${i===1?'mn':''}">${i+1}</div>
              <div>
                <div style="font-size:.82rem;font-weight:600">${fmtD(dt)}</div>
                <div style="font-size:.72rem;color:var(--sub)">${esc(s.bookTitle)}</div>
              </div>
            </div>`;
          });
        }
      });
    }
    h+=`</div>`;

    /* 다음달 예고 */
    if(nb&&nb.title){
      h+=`<div class="card gd">
        <div class="sec-ttl">🔜 다음달 예고</div>
        <div class="bk-ttl">${esc(nb.title)}</div>
        <div class="bk-au">${esc(nb.author||'')}</div>
        ${nb.month?`<div style="margin-top:6px"><span class="tag gd">${esc(nb.month)}</span></div>`:''}
      </div>`;
    }

    $('c-book').innerHTML=h;
  }catch(e){
    $('c-book').innerHTML=`<div class="empty"><span class="ico">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}

// ════════════════════════════════════════════════════
// 2. 서평 탭
// ════════════════════════════════════════════════════
async function renderRev(){
  spin('c-rev');
  try{
    const dash=await getDash();
    const sessions=(dash.sessions||[]).filter(s=>s.status!=='done');
    if(sessions.length===0){
      $('c-rev').innerHTML=`<div class="card"><div class="empty"><span class="ico">📝</span>현재 진행 중인 북토크가 없습니다.</div></div>`;
      return;
    }
    const sess=sessions[0];
    const rd=await apiGet({action:'getReviews',sessionId:sess.sessionId});
    const reviews=rd.reviews||[];
    const myRev=reviews.find(r=>String(r.alias).trim()===String(S.alias).trim());

    let h=`<div class="card lv" style="margin-bottom:13px">
      <div class="sec-ttl">현재 북토크</div>
      <div class="bk-ttl">${esc(sess.bookTitle)}</div>
      <div class="bk-au">${esc(sess.bookAuthor||'')}</div>
    </div>`;

    /* 내 서평 영역 */
    if(S.alias){
      if(myRev){
        h+=`<div class="card mn" style="margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div class="sec-ttl" style="margin-bottom:0">내 서평</div>
            <button class="btn gh sm" onclick="openEditRev('${esc(sess.sessionId)}','${esc(myRev.alias)}')">수정</button>
          </div>
          ${ratingDisp(myRev)}
          ${myRev.comment?`<div class="rev-txt" style="margin-top:5px">${esc(myRev.comment)}</div>`:''}
        </div>`;
      } else {
        h+=`<button class="btn prim blk" style="margin-bottom:13px" onclick="openNewRev('${esc(sess.sessionId)}')">서평 작성하기</button>`;
      }
    } else {
      h+=`<div style="font-size:.77rem;color:var(--sub);text-align:center;margin-bottom:13px">로그인 후 서평을 작성할 수 있습니다.</div>`;
    }

    /* 클러버 서평 목록 */
    h+=`<div class="card"><div class="sec-ttl">클러버 서평 (${reviews.length})</div>`;
    if(reviews.length===0){
      h+=`<div class="empty" style="padding:10px 0">아직 서평이 없습니다. 첫 번째 서평을 남겨보세요!</div>`;
    } else {
      reviews.forEach(r=>{
        const canEdit=S.alias&&(S.alias===r.alias||S.isAdmin);
        const isMe=S.alias&&S.alias===r.alias;
        h+=`<div class="rev-item" style="${isMe?'background:#f5f2f6;margin:0 -15px;padding:10px 15px;border-radius:6px;':''}">
          <div class="rev-hdr">
            <span class="rev-alias">${esc(r.alias)}${isMe?' <span style="font-size:.65rem;color:var(--sub)">(나)</span>':''}</span>
            ${canEdit?`<button class="btn gh sm" onclick="openEditRev('${esc(sess.sessionId)}','${esc(r.alias)}')">수정</button>`:''}
          </div>
          ${ratingDisp(r)}
          ${r.comment?`<div class="rev-txt">${esc(r.comment)}</div>`:''}
        </div>`;
      });
    }
    h+=`</div>`;
    $('c-rev').innerHTML=h;
  }catch(e){
    $('c-rev').innerHTML=`<div class="empty"><span class="ico">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}

// 별점 한 줄 요약: 감동 3 · 전환 3 · 새로움 3 · 평균 3.0
function ratingDisp(r){
  const g=parseInt(r.r_gamdon)||0;
  const j=parseInt(r.r_jeonhwan)||0;
  const s=parseInt(r.r_saeroun)||0;
  const avg=r.avgRating?(parseFloat(r.avgRating).toFixed(1)):((g+j+s)/3).toFixed(1);
  return `<div style="font-size:.72rem;color:var(--sub);display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:3px">
    <span><span style="color:var(--lavender)">감동</span> <strong style="color:var(--text)">${g}</strong></span>
    <span style="color:var(--border)">·</span>
    <span><span style="color:var(--mint)">전환</span> <strong style="color:var(--text)">${j}</strong></span>
    <span style="color:var(--border)">·</span>
    <span><span style="color:var(--gold)">새로움</span> <strong style="color:var(--text)">${s}</strong></span>
    <span style="color:var(--border)">·</span>
    <span>평균 <strong style="color:var(--text)">${avg}</strong></span>
  </div>`;
}

/* 별점 클릭 모달 점 렌더 */
function renderDots(){
  const cfg=[
    {id:'d-gamdon',   key:'gamdon',   cls:''},
    {id:'d-jeonhwan', key:'jeonhwan', cls:'mn'},
    {id:'d-saeroun',  key:'saeroun',  cls:'gd'},
  ];
  cfg.forEach(c=>{
    const el=$(c.id);
    if(!el)return;
    el.innerHTML='';
    for(let i=1;i<=5;i++){
      const d=document.createElement('span');
      d.className='dot'+(i<=S.ratings[c.key]?' on':'');
      // 클릭 핸들러 (클로저 정확히)
      d.addEventListener('click',(()=>{
        const score=i;const key=c.key;
        return ()=>{S.ratings[key]=score;renderDots()};
      })());
      el.appendChild(d);
    }
  });
}

function openNewRev(sessionId){
  if(!S.alias){toast('로그인이 필요합니다.');return}
  S.ratings={gamdon:0,jeonhwan:0,saeroun:0};
  $('revSessId').value=sessionId;
  $('revMode').value='new';
  $('revEditAlias').value='';
  $('revMoTtl').textContent='서평 작성';
  $('revComment').value='';$('revCnt').textContent='0';
  $('btnRevConfirm').textContent='서평 등록';
  renderDots();
  mo('moRev',true);
}
async function openEditRev(sessionId,alias){
  const rd=await apiGet({action:'getReviews',sessionId});
  const reviews=rd.reviews||[];
  const r=reviews.find(rv=>String(rv.alias).trim()===String(alias).trim());
  if(!r){toast('서평을 찾을 수 없습니다.');return}
  S.ratings={
    gamdon:parseInt(r.r_gamdon)||0,
    jeonhwan:parseInt(r.r_jeonhwan)||0,
    saeroun:parseInt(r.r_saeroun)||0,
  };
  $('revSessId').value=sessionId;
  $('revMode').value='edit';
  $('revEditAlias').value=alias;
  $('revMoTtl').textContent='서평 수정';
  $('revComment').value=r.comment||'';
  $('revCnt').textContent=(r.comment||'').length;
  $('btnRevConfirm').textContent='수정 저장';
  renderDots();
  mo('moRev',true);
}

// ════════════════════════════════════════════════════
// 3. 추천 탭
// ════════════════════════════════════════════════════
async function renderRec(){
  spin('c-rec');
  try{
    const d=await getDash();
    const recs=d.recommendations||[];
    let h='';
    if(S.alias){
      h+=`<button class="btn prim blk" style="margin-bottom:13px" id="btnRecOpen">+ 책 추천 등록</button>`;
    } else {
      h+=`<div style="font-size:.77rem;color:var(--sub);text-align:center;margin-bottom:13px">로그인 후 추천을 등록할 수 있습니다.</div>`;
    }
    h+=`<div class="card"><div class="sec-ttl">클러버 추천 목록</div>`;
    if(recs.length===0){
      h+=`<div class="empty" style="padding:10px 0">아직 추천된 책이 없습니다.</div>`;
    } else {
      recs.forEach(r=>{
        const canDel=S.alias&&(S.alias===r.alias||S.isAdmin);
        h+=`<div class="rec-item">
          <div style="flex:1;min-width:0;padding-right:8px">
            <div style="font-size:.88rem;font-weight:600">${esc(r.title)}</div>
            <div style="font-size:.74rem;color:var(--sub)">${esc(r.author||'')}${r.pub?' · '+esc(r.pub):''}</div>
            <div style="margin-top:3px"><span class="tag lv">${esc(r.alias)}</span></div>
            ${r.reason?`<div style="font-size:.76rem;color:var(--sub);margin-top:4px;line-height:1.5">${esc(r.reason)}</div>`:''}
          </div>
          ${canDel?`<button class="btn gh sm" onclick="delRec('${esc(r.alias)}','${esc(r.title)}')">삭제</button>`:''}
        </div>`;
      });
    }
    h+=`</div>`;
    $('c-rec').innerHTML=h;
    const ob=$('btnRecOpen');
    if(ob)ob.addEventListener('click',()=>{
      $('rcTitle').value='';$('rcAuthor').value='';$('rcPub').value='';$('rcReason').value='';
      mo('moRec',true);
    });
  }catch(e){
    $('c-rec').innerHTML=`<div class="empty"><span class="ico">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}
async function delRec(alias,title){
  if(!confirm(`"${title}" 추천을 삭제하시겠습니까?`))return;
  await apiPost({action:'deleteRecommendation',alias,title,isAdmin:S.isAdmin});
  toast('삭제되었습니다.');S.dash=null;
  renderRec();
}

// ════════════════════════════════════════════════════
// 4. 투표 탭  (최신 1개만, 실시간 집계)
// ════════════════════════════════════════════════════
async function renderVote(){
  spin('c-vote');
  try{
    // 투표는 항상 최신 데이터 조회 (캐시 무효화)
    S.votes=null;
    const d=await getVotes(true);
    const all=(d.votes||[]).filter(v=>String(v.status).trim()!=='deleted');
    // createdAt 역순 → 최신 1개
    const sorted=all.sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)));

    if(sorted.length===0){
      $('c-vote').innerHTML=`<div class="card"><div class="empty"><span class="ico">🗳</span>진행 중인 투표가 없습니다.</div></div>`;
      return;
    }
    const v=sorted[0];
    const opts=(v.options||'').split('||').map(o=>o.trim()).filter(Boolean);
    const responses=Array.isArray(v.responses)?v.responses:[];

    // 참여자 집합
    const participants=[...new Set(responses.map(r=>String(r.alias).trim()).filter(Boolean))];
    const totalPeople=participants.length;

    // 옵션별 집계 (trim 비교)
    const optData=opts.map(opt=>{
      const rs=responses.filter(r=>String(r.bookTitle).trim()===opt);
      const sum=rs.reduce((acc,r)=>acc+parseFloat(r.score||0),0);
      const avg=rs.length>0?(sum/rs.length).toFixed(1):'-';
      const myR=rs.find(r=>String(r.alias).trim()===String(S.alias).trim());
      const myScore=myR?parseInt(myR.score):0;
      return{opt,avg,count:rs.length,myScore,sum};
    });

    // 최고 평균 (바 계산용)
    const maxAvg=Math.max(...optData.map(o=>parseFloat(o.avg)||0),0.1);

    let h=`<div class="card lv">
      <div class="sec-ttl">🗳 투표</div>
      <div style="font-size:.95rem;font-weight:700;margin-bottom:3px">${esc(v.title)}</div>
      ${v.deadline?`<div style="font-size:.7rem;color:var(--sub);margin-bottom:8px">마감: ${fmt(v.deadline)}</div>`:'<div style="margin-bottom:8px"></div>'}`;

    optData.forEach(o=>{
      const barPct=parseFloat(o.avg)>0?Math.round((parseFloat(o.avg)/maxAvg)*100):0;
      const avgTxt=o.avg==='-'?'아직 없음':`<strong>${o.avg}</strong>점`;
      h+=`<div class="vote-opt">
        <div class="vote-opt-ttl">${esc(o.opt)}</div>`;

      // 점수 입력 (로그인 시)
      if(S.alias){
        h+=`<div class="score-row">
          <span style="font-size:.7rem;color:var(--sub);margin-right:4px;flex-shrink:0">내 점수</span>`;
        for(let i=1;i<=5;i++){
          h+=`<button class="sc-btn${o.myScore===i?' on':''}"
            onclick="doVote('${esc(v.voteId)}','${esc(o.opt)}',${i})">${i}</button>`;
        }
        if(o.myScore>0){
          h+=`<span style="font-size:.7rem;color:var(--lavender);margin-left:6px;font-weight:600">${o.myScore}점 선택됨</span>`;
        }
        h+=`</div>`;
      }

      // 집계 결과
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
          <div style="font-size:.7rem;color:var(--sub)">평균 ${avgTxt} · ${o.count}명 참여</div>
        </div>
        <div class="bar-wrap" style="margin-top:5px">
          <div class="bar-fill" style="width:${barPct}%"></div>
        </div>
      </div>`;
    });

    // 전체 참여 현황
    h+=`<div class="vote-participants">
      👥 참여 클러버 <strong>${totalPeople}</strong>명
      ${totalPeople>0?' · '+participants.map(p=>esc(p)).join(' · '):''}
    </div>`;

    if(S.isAdmin){
      h+=`<div style="margin-top:10px;text-align:right">
        <button class="btn dng sm" onclick="doDelVote('${esc(v.voteId)}')">투표 삭제</button>
      </div>`;
    }
    h+=`</div>`;
    $('c-vote').innerHTML=h;
  }catch(e){
    console.error('renderVote error:',e);
    $('c-vote').innerHTML=`<div class="empty"><span class="ico">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}

async function doVote(voteId,bookTitle,score){
  if(!S.alias){toast('로그인 후 투표할 수 있습니다.');return}
  // 해당 버튼 즉시 시각 반영
  document.querySelectorAll('.vote-opt').forEach(optEl=>{
    const ttl=optEl.querySelector('.vote-opt-ttl');
    if(ttl&&ttl.textContent.trim()===bookTitle.trim()){
      optEl.querySelectorAll('.sc-btn').forEach((b,i)=>{
        b.classList.toggle('on',i+1===score);
      });
      // "X점 선택됨" 텍스트 갱신
      let selTxt=optEl.querySelector('.sel-txt');
      if(!selTxt){selTxt=document.createElement('span');selTxt.className='sel-txt';
        selTxt.style.cssText='font-size:.7rem;color:var(--lavender);margin-left:6px;font-weight:600';
        const sr=optEl.querySelector('.score-row');if(sr)sr.appendChild(selTxt);}
      selTxt.textContent=score+'점 선택됨';
    }
  });
  await apiPost({action:'submitVoteResponse',voteId,alias:S.alias,bookTitle,score});
  toast('투표가 반영되었습니다.');
  S.votes=null;
  setTimeout(()=>renderVote(),1800);
}
async function doDelVote(voteId){
  if(!confirm('이 투표를 삭제하시겠습니까?'))return;
  await apiPost({action:'deleteVote',voteId});
  toast('투표가 삭제되었습니다.');S.votes=null;renderVote();
}

async function renderLib(){
  spin('c-lib');
  try{
    const d=await getLib(true);
    const active=(d.active||[]).slice().reverse(); // 최신 먼저
    const archive=d.archive||[];
    let h='';

    /* 2026.4~ */
    h+=`<div style="font-size:.78rem;font-weight:700;color:var(--lavender);margin-bottom:8px">2026.4 ~</div>`;
    h+=`<div class="card" style="padding:10px 14px">`;
    if(active.length===0){
      h+=`<div class="empty" style="padding:10px 0">완료된 북토크가 없습니다.</div>`;
    } else {
      active.forEach(item=>{
        const code=monthCode(item.month);
        const rid='lr_'+String(item.sessionId).replace(/\W/g,'');
        const revs=item.reviews||[];
        h+=`<div class="lib-item" id="li_${rid}" onclick="toggleLibRev('${rid}')">
          <div class="lib-code">${code}.</div>
          <div class="lib-info">
            <div class="lib-ttl">${esc(item.bookTitle)}</div>
            <div class="lib-au">${esc(item.bookAuthor||'')}</div>
          </div>
          <div class="lib-avg">★${item.avgRating}</div>
          <div class="lib-chevron">▶</div>
        </div>
        <div class="lib-reviews" id="${rid}">`;
        if(revs.length===0){
          h+=`<div style="font-size:.76rem;color:var(--sub);padding:6px 0">서평이 없습니다.</div>`;
        } else {
          revs.forEach(r=>{
            h+=`<div class="rev-item" style="padding:8px 0">
              <div class="rev-hdr">
                <span class="rev-alias">${esc(r.alias)}</span>
                <span class="avg-b">${r.avgRating}점</span>
              </div>
              ${ratingDisp(r)}
              <div class="rev-txt">${esc(r.comment||'')}</div>
            </div>`;
          });
        }
        h+=`</div>`;
      });
    }
    h+=`</div>`;

    /* ~ 2026.3 (토글) */
    if(archive.length>0){
      // 연/월 그룹핑
      const grouped={};
      archive.forEach(a=>{
        const ym=a.month||'미상';
        if(!grouped[ym])grouped[ym]=[];
        grouped[ym].push(a);
      });
      const sortedYMs=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

      h+=`<div id="archToggle" class="arch-toggle" onclick="toggleArch()">
        <span>~ 2026.3 이전</span><span class="arrow" id="archArrow">▶</span>
      </div>
      <div class="arch-list" id="archList">
        <div class="card" style="padding:10px 14px">`;
      sortedYMs.forEach(ym=>{
        const code=monthCode(ym);
        grouped[ym].forEach(a=>{
          h+=`<div class="arch-item">
            <div class="arch-code">${code}.</div>
            <div style="flex:1;min-width:0">
              <div class="arch-ttl">${esc(a.bookTitle)}</div>
              <div class="arch-au">${esc(a.bookAuthor||'')}</div>
            </div>
          </div>`;
        });
      });
      h+=`</div></div>`;
    }

    $('c-lib').innerHTML=h;
  }catch(e){
    $('c-lib').innerHTML=`<div class="empty"><span class="ico">⚠️</span>데이터를 불러오지 못했습니다.</div>`;
  }
}
function toggleLibRev(rid){
  const revEl=$(rid);
  const itemEl=$('li_'+rid);
  if(revEl)revEl.classList.toggle('open');
  if(itemEl)itemEl.classList.toggle('open');
}
function toggleArch(){
  const list=$('archList'),arrow=$('archArrow'),tog=$('archToggle');
  if(!list)return;
  const open=list.classList.toggle('open');
  if(arrow)arrow.style.transform=open?'rotate(90deg)':'rotate(0)';
  if(tog)tog.classList.toggle('open',open);
}

function openCBModal(type){
  $('cbType').value=type;
  $('cbMoTtl').textContent=type==='current'?'이달의 책 설정':'다음달 책 설정';
  const src=type==='current'?S.dash?.currentBook:S.dash?.nextBook;
  $('cbTitle').value=src?(src.bookTitle||src.title||''):'';
  $('cbAuthor').value=src?(src.bookAuthor||src.author||''):'';
  $('cbMonth').value=src?src.month||'':'';
  mo('moCurBook',true);
}
function openSessModal(sessionId){
  $('sessMoId').value=sessionId||'';
  $('sessMoTtl').textContent=sessionId?'세션 수정':'세션 생성';
  $('sessTitle').value='';$('sessAuthor').value='';$('sessD1').value='';$('sessD2').value='';
  $('btnSessConfirm').textContent=sessionId?'수정 저장':'세션 생성';
  if(sessionId&&S.dash){
    const s=(S.dash.sessions||[]).find(x=>x.sessionId===sessionId);
    if(s){$('sessTitle').value=s.bookTitle||'';$('sessAuthor').value=s.bookAuthor||'';
          $('sessD1').value=s.date1||'';$('sessD2').value=s.date2||'';}
  }
  mo('moSess',true);
}
function openVoteModal(){
  $('vTitle').value='';$('vDeadline').value='';
  const recs=S.dash?.recommendations||[];
  let lh='';
  if(recs.length===0){lh=`<div style="font-size:.77rem;color:var(--sub)">추천된 책이 없습니다.</div>`}
  else recs.forEach((r,i)=>{
    lh+=`<div class="chk-item" onclick="toggleVC(${i})">
      <div class="chkbox" id="vc_${i}"></div>
      <div><div style="font-size:.82rem;font-weight:500">${esc(r.title)}</div>
      <div style="font-size:.7rem;color:var(--sub)">${esc(r.author||'')}</div></div>
    </div>`;
  });
  $('vOptList').innerHTML=lh;
  $('vOptList').dataset.recs=JSON.stringify(recs.map(r=>r.title));
  mo('moVote',true);
}
function toggleVC(i){const el=$('vc_'+i);if(el)el.classList.toggle('on')}

async function doComplete(sessionId){

  toast('삭제되었습니다.');S.dash=null;renderAdm();

async function doResetRev(sessionId,title){

// ════════════════════════════════════════════════════
// 이벤트 바인딩 (DOMContentLoaded)
// ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{

  /* 탭 */
  document.querySelectorAll('.tab').forEach(b=>
    b.addEventListener('click',()=>switchTab(b.dataset.tab)));

  /* 로그인 */
  $('btnLoIn').addEventListener('click',()=>{
    $('loAlias').value='';$('loPw').value='';$('loErr').style.display='none';
    $('pwField').style.display='none';
    mo('loPanel',true);
  });
  $('btnLoCancel').addEventListener('click',()=>mo('loPanel',false));
  // 별칭 입력 시 관리자 여부에 따라 비번 필드 표시
  window.onAliasInput=function(){
    const alias=$('loAlias').value.trim();
    $('pwField').style.display=(alias===ADMIN_ALIAS)?'block':'none';
    $('loErr').style.display='none';
  };
  $('loPw').addEventListener('keydown',e=>{if(e.key==='Enter')$('btnLoConfirm').click()});
  $('loAlias').addEventListener('keydown',e=>{if(e.key==='Enter')$('btnLoConfirm').click()});
  $('btnLoConfirm').addEventListener('click',()=>{
    const alias=$('loAlias').value.trim();
    const err=$('loErr');
    if(!alias){err.textContent='별칭을 입력해주세요.';err.style.display='block';return}

    if(alias===ADMIN_ALIAS){
      // 관리자: 비밀번호 확인
      const pw=$('loPw').value.trim();
      if(!pw){err.textContent='관리자 비밀번호를 입력해주세요.';err.style.display='block';return}
      if(pw!==ADMIN_PW){err.textContent='비밀번호가 틀렸습니다.';err.style.display='block';return}
      S.alias=alias;S.isAdmin=true;
    } else {
      // 일반 클러버: 별칭만으로 로그인
      S.alias=alias;S.isAdmin=false;
    }
    localStorage.setItem('ieum_alias',alias);
    mo('loPanel',false);updateHeader();
    toast(`${alias}님, 환영합니다!`);
    renderTab(S.tab);
  });

  /* 회원 등록 */
  $('btnRegOpen').addEventListener('click',()=>{mo('loPanel',false);mo('moReg',true)});
  $('btnRegClose').addEventListener('click',()=>mo('moReg',false));
  $('btnRegConfirm').addEventListener('click',async()=>{
    const alias=$('rAlias').value.trim(),name=$('rName').value.trim();
    if(!alias||!name){toast('별칭과 이름은 필수입니다.');return}
    $('btnRegConfirm').textContent='등록 중...';
    await apiPost({action:'registerMember',alias,name,
      birth:$('rBirth').value.trim(),gender:$('rGender').value,
      emotionalLabor:$('rEmot').value.trim()});
    toast('등록 요청을 전송했습니다. 잠시 후 로그인해주세요.');
    mo('moReg',false);$('btnRegConfirm').textContent='등록하기';
    setTimeout(()=>mo('loPanel',true),400);
  });

  /* 추천 등록 */
  $('btnRecClose').addEventListener('click',()=>mo('moRec',false));
  $('btnRecConfirm').addEventListener('click',async()=>{
    if(!S.alias){toast('로그인이 필요합니다.');return}
    const title=$('rcTitle').value.trim();
    if(!title){toast('책 제목을 입력해주세요.');return}
    $('btnRecConfirm').textContent='등록 중...';
    await apiPost({action:'addRecommendation',alias:S.alias,title,
      author:$('rcAuthor').value.trim(),pub:$('rcPub').value.trim(),
      reason:$('rcReason').value.trim()});
    toast('추천이 등록되었습니다.');mo('moRec',false);
    $('btnRecConfirm').textContent='추천 등록';S.dash=null;
    setTimeout(()=>renderRec(),1500);
  });

  /* 서평 */
  $('btnRevClose').addEventListener('click',()=>mo('moRev',false));
  $('revComment').addEventListener('input',function(){$('revCnt').textContent=this.value.length});
  $('btnRevConfirm').addEventListener('click',async()=>{
    if(!S.alias){toast('로그인이 필요합니다.');return}
    const sessionId=$('revSessId').value;
    const mode=$('revMode').value;
    const comment=$('revComment').value.trim();
    if(!S.ratings.gamdon&&!S.ratings.jeonhwan&&!S.ratings.saeroun){
      toast('별점을 하나 이상 선택해주세요.');return}
    const body={
      action:mode==='edit'?'updateReview':'submitReview',
      sessionId,
      alias:mode==='edit'?$('revEditAlias').value:S.alias,
      r_gamdon:S.ratings.gamdon,r_jeonhwan:S.ratings.jeonhwan,r_saeroun:S.ratings.saeroun,
      comment,isAdmin:S.isAdmin,
    };
    $('btnRevConfirm').textContent='저장 중...';
    await apiPost(body);
    mo('moRev',false);
    toast(mode==='edit'?'서평이 수정되었습니다.':'서평이 등록되었습니다.');
    $('btnRevConfirm').textContent=mode==='edit'?'수정 저장':'서평 등록';
    setTimeout(()=>renderRev(),1500);
  });

  /* 투표 생성 */
  $('btnVoteClose').addEventListener('click',()=>mo('moVote',false));
  $('btnVoteConfirm').addEventListener('click',async()=>{
    const title=$('vTitle').value.trim();
    if(!title){toast('투표 제목을 입력해주세요.');return}
    const recsJson=$('vOptList').dataset.recs;
    const recs=recsJson?JSON.parse(recsJson):[];
    const selected=[];
    recs.forEach((t,i)=>{const el=$('vc_'+i);if(el&&el.classList.contains('on'))selected.push(t)});
    if(selected.length<2){toast('2개 이상 선택해주세요.');return}
    $('btnVoteConfirm').textContent='생성 중...';
    await apiPost({action:'createVote',title,options:selected,deadline:$('vDeadline').value});
    toast('투표가 생성되었습니다.');mo('moVote',false);
    $('btnVoteConfirm').textContent='투표 생성';S.votes=null;
    setTimeout(()=>{renderAdm();if(S.tab==='t-vote')renderVote()},1500);
  });

  /* 세션 */
  $('btnSessClose').addEventListener('click',()=>mo('moSess',false));
  $('btnSessConfirm').addEventListener('click',async()=>{
    const sessionId=$('sessMoId').value;
    const bookTitle=$('sessTitle').value.trim();
    if(!bookTitle){toast('책 제목을 입력해주세요.');return}
    const body={action:sessionId?'updateSession':'createSession',bookTitle,
      bookAuthor:$('sessAuthor').value.trim(),
      date1:$('sessD1').value,date2:$('sessD2').value};
    if(sessionId)body.sessionId=sessionId;
    $('btnSessConfirm').textContent='저장 중...';
    await apiPost(body);
    toast(sessionId?'수정되었습니다.':'세션이 생성되었습니다.');
    mo('moSess',false);$('btnSessConfirm').textContent='저장';
    S.dash=null;setTimeout(()=>renderAdm(),1500);
  });

  /* 이달의 책 */
  $('btnCBClose').addEventListener('click',()=>mo('moCurBook',false));
  $('btnCBConfirm').addEventListener('click',async()=>{
    const type=$('cbType').value;
    const title=$('cbTitle').value.trim();
    if(!title){toast('책 제목을 입력해주세요.');return}
    const body=type==='current'
      ?{action:'setCurrentBook',bookTitle:title,bookAuthor:$('cbAuthor').value.trim(),month:$('cbMonth').value.trim()}
      :{action:'setNextBook',title,author:$('cbAuthor').value.trim(),month:$('cbMonth').value.trim()};
    $('btnCBConfirm').textContent='저장 중...';
    await apiPost(body);
    toast('저장되었습니다.');mo('moCurBook',false);
    $('btnCBConfirm').textContent='저장';S.dash=null;
    setTimeout(()=>{renderAdm();renderBook()},1500);
  });

  /* 모달 바깥 클릭 닫기 */
  document.querySelectorAll('.mo').forEach(o=>{
    o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('on')});
  });

  /* 초기 */
  updateHeader();
  renderBook();
});
</script>
</body>
</html>

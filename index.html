<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이음북클럽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F9F8F6; 
            /* 검은색을 배제한 갈색 & 그린 팔레트 */
            --deep-green: #2D402F;   /* 짙은 숲색 (타이틀/강조) */
            --point-mint: #5D7A65;   /* 차분한 민트그린 (포인트) */
            --deep-brown: #4B3621;   /* 짙은 밤색 (본문 텍스트) */
            --soft-brown: #7A6652;   /* 연한 갈색 (부가 정보) */
            --warm-gray: #DCD7D0;    /* 따뜻한 회색 (선/구분선) */
            --tile-bg: #FFFFFF;      /* 타일 배경 */
        }

        body { 
            background: var(--bg); 
            margin: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            font-weight: 400; 
            color: var(--deep-brown); /* 기본 텍스트를 짙은 밤색으로 설정 */
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        .app-frame { width: 100%; max-width: 480px; padding: 40px 20px; text-align: center; }
        
        h1 { 
            font-family: 'Nanum Myeongjo', serif; 
            font-weight: 700; 
            font-size: 2.2rem; 
            color: var(--deep-green); 
            margin-bottom: 60px; 
            letter-spacing: 4px; 
        }
        
        /* 버튼 디자인 (갈색 & 그린 조화) */
        .btn-base { 
            background: transparent; 
            padding: 14px 0; 
            width: 100%; 
            font-size: 1rem; 
            letter-spacing: 6px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-family: 'Noto Sans KR', sans-serif; 
            font-weight: 500;
            margin-bottom: 12px; 
        }
        .btn-first { border: 1.5px solid var(--soft-brown); color: var(--deep-brown); }
        .btn-ieum { border: 1.5px solid var(--point-mint); color: var(--deep-green); }
        .btn-base:hover { background: rgba(93, 122, 101, 0.05); }
        
        /* 입력창 디자인 */
        input, textarea { 
            background: transparent; 
            border: none; 
            border-bottom: 1.5px solid var(--warm-gray); 
            padding: 12px; 
            color: var(--deep-brown); 
            font-weight: 400; 
            outline: none; 
            font-size: 1.05rem; 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 25px; 
            text-align: center;
        }
        input::placeholder, textarea::placeholder { color: var(--soft-brown); opacity: 0.6; }

        /* 섹션 타이틀 (그린/브라운 톤) */
        .section-title { 
            font-size: 0.9rem; 
            font-weight: 500; 
            color: var(--point-mint); 
            margin: 40px 0 15px 0; 
            border-bottom: 1.5px solid var(--warm-gray); 
            padding-bottom: 8px; 
            text-align: left; 
            letter-spacing: 1px;
        }

        .book-title { 
            font-size: 1.4rem; 
            color: var(--deep-green); 
            font-weight: 700; 
            margin-bottom: 25px; 
            text-align: left; 
            line-height: 1.4;
        }
        
        /* 타일 스타일 */
        .tile { 
            border: 1px solid var(--warm-gray); 
            background: var(--tile-bg);
            margin-bottom: 15px; 
            padding: 20px; 
            text-align: left; 
            cursor: pointer; 
            box-shadow: 0 2px 8px rgba(75, 54, 33, 0.05); /* 밤색 계열의 미세한 그림자 */
        }
        .tile-header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.95rem; 
            margin-bottom: 8px; 
            font-weight: 500;
            color: var(--deep-green);
        }
        .tile-summary { 
            font-size: 1rem; 
            color: var(--deep-brown); 
            line-height: 1.5;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .tile-detail { 
            display: none; 
            margin-top: 15px; 
            border-top: 1px dashed var(--warm-gray); 
            padding-top: 15px; 
            font-size: 1rem; 
            color: var(--deep-brown);
        }
        
        .hidden { display: none !important; }

        /* 하단 내비게이션 */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #fff; 
            border-top: 1.5px solid var(--warm-gray); 
            display: flex; 
            justify-content: space-around; 
            padding: 18px 0; 
            z-index: 100; 
        }
        .nav-tab { 
            font-size: 0.85rem; 
            color: var(--soft-brown); 
            cursor: pointer; 
            font-weight: 500;
        }
        .nav-tab.active { 
            color: var(--deep-green); 
            border-bottom: 2px solid var(--deep-green); 
            padding-bottom: 2px;
        }
    </style>
</head>
<body>

<div class="app-frame">
    <h1>이음북클럽</h1>

    <div id="home-screen">
        <button class="btn-base btn-first" style="max-width: 240px; margin: 0 auto 15px;" onclick="showScreen('register-screen')">처음</button>
        <button class="btn-base btn-ieum" style="max-width: 240px; margin: 0 auto;" onclick="showScreen('login-screen')">이음</button>
    </div>

    <div id="login-screen" class="hidden">
        <input type="text" id="login-alias" placeholder="별칭을 입력해 주세요" style="max-width: 280px;">
        <button class="btn-base btn-ieum" style="max-width: 240px; margin: 0 auto;" onclick="enterDashboard()">참여하기</button>
    </div>

    <div id="dashboard-screen" class="hidden">
        <p id="welcome-msg" style="text-align: left; font-size: 1.1rem; font-weight: 500; margin-bottom: 40px;"></p>
        <div class="section-title">이번 달의 이음책</div>
        <div id="current-book-area" style="margin-bottom: 40px;">
            <div class="book-title" id="current-title">데이터를 불러오는 중...</div>
            <button class="btn-base btn-ieum" onclick="document.getElementById('club-form').classList.toggle('hidden')">이달의 북클럽 참여하기</button>
            <div id="club-form" class="hidden" style="margin-top: 25px; text-align: left; border-left: 2px solid var(--point-mint); padding-left: 20px;">
                <p style="font-size:1rem; font-weight: 500; color: var(--deep-green); margin-bottom: 15px;">최종 서평 및 평가</p>
                <textarea id="final-review" rows="4" placeholder="당신의 문장을 남겨주세요." style="text-align:left;"></textarea>
                <button class="btn-base btn-ieum" style="padding: 10px; font-size: 0.9rem;">기록 저장하기</button>
            </div>
        </div>
        <div class="section-title">클러버들의 기록</div>
        <div id="tile-container"></div>
        <button id="load-more-btn" class="btn-base" style="font-size: 0.95rem; font-weight: 500; color: var(--soft-brown); border: none; text-decoration: underline; margin-top: 10px;" onclick="loadMoreTiles()">기록 더 보기</button>
    </div>

    <div id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-tab active">이음책</div>
        <div class="nav-tab">추천 신청</div>
        <div class="nav-tab">누적 목록</div>
        <div class="nav-tab">투표/결과</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWxK5JVNVuhdndODtqhaczORX2Zwkb6xkXxfBcKZvjCTjVDYzQUT9gjcNxsIY7wnmq6g/exec";
    let allReviews = [];
    let currentIndex = 0;
    const pageSize = 5;

    function showScreen(id) {
        document.querySelectorAll('.app-frame > div:not(.bottom-nav)').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function enterDashboard() {
        const alias = document.getElementById('login-alias').value;
        if(!alias) { alert("별칭을 입력해 주세요."); return; }
        document.getElementById('welcome-msg').innerHTML = `<span style="color:var(--point-mint);">${alias}</span> 클러버님, 반갑습니다.`;
        showScreen('dashboard-screen');
        document.getElementById('bottom-nav').classList.remove('hidden');
        fetchDashboardData();
    }

    async function fetchDashboardData() {
        allReviews = [
            { alias: '생뚱', total: 20, review: '올해 읽은 책 중 가장 깊은 위로가 되었습니다. 문장 하나하나가 마음을 두드리네요.', date: '2026-04-10' },
            { alias: '김숙희', total: 18, review: '일상의 소중함을 다시금 깨닫게 해주는 따뜻한 시간이었습니다.', date: '2026-04-09' }
        ];
        document.getElementById('current-title').innerText = "2604 편안함의 습격";
        renderTiles();
    }

    function renderTiles() {
        const container = document.getElementById('tile-container');
        const nextBatch = allReviews.slice(currentIndex, currentIndex + pageSize);
        nextBatch.forEach(data => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerHTML = `<div class="tile-header"><span>${data.alias}</span><span style="color:var(--soft-brown); font-size: 0.85rem;">${data.date}</span></div>
                <div class="tile-summary">${data.review}</div>
                <div class="tile-detail"><p style="color:var(--point-mint); font-weight: 500; margin-top:0;">종합 평가: ${data.total} / 25점</p><p>${data.review}</p></div>`;
            tile.onclick = () => { const d = tile.querySelector('.tile-detail'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; };
            container.appendChild(tile);
        });
        currentIndex += pageSize;
        if (currentIndex >= allReviews.length) document.getElementById('load-more-btn').style.display = 'none';
    }
    function loadMoreTiles() { renderTiles(); }
</script>
</body>
</html>
